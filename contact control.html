<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>contact control</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0f1a;--sf:#131929;--sf2:#1c2236;--sf3:#222b42;
  --bd:#2a344f;--bd2:#354060;
  --ac:#4f9eff;--acd:rgba(79,158,255,.12);--acg:rgba(79,158,255,.25);
  --tx:#dce6f5;--txm:#7a8aab;--txf:#4a5470;
  --err:#ef5350;--errd:rgba(239,83,80,.1);
  --ok:#43c98c;--warn:#f5a623;--warnd:rgba(245,166,35,.12);
  --r:8px;--rl:12px;--rx:16px
}
[data-theme=light]{
  --bg:#edf1f7;--sf:#fff;--sf2:#f3f6fb;--sf3:#e8edf6;
  --bd:#d1d9eb;--bd2:#b8c4dc;
  --ac:#1a6fc4;--acd:rgba(26,111,196,.08);--acg:rgba(26,111,196,.2);
  --tx:#1a2340;--txm:#5a6888;--txf:#9aa3be;
  --err:#d32f2f;--errd:rgba(211,47,47,.08);
  --ok:#2e9e6f;--warn:#c97a00;--warnd:rgba(201,122,0,.1)
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:13px;line-height:1.6;transition:background .3s,color .3s}

@keyframes breathe{0%,100%{opacity:1}50%{opacity:.28}}
.bl-slow{animation:breathe 2.4s ease-in-out infinite}
.bl-fast{animation:breathe 1.4s ease-in-out infinite}

/* Header */
header{position:sticky;top:0;z-index:100;background:var(--sf);border-bottom:1px solid var(--bd);padding:0 1.25rem;height:52px;display:flex;align-items:center;gap:8px}
.logo{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--ac);white-space:nowrap;flex-shrink:0}
.logo-icon{width:28px;height:28px;background:var(--acd);border:1px solid var(--acg);border-radius:8px;display:flex;align-items:center;justify-content:center}
.hsp{flex:1}
.pill{display:flex;align-items:center;gap:5px;background:var(--sf2);border:1px solid var(--bd);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--txm);white-space:nowrap;flex-shrink:0}
.sbar{width:52px;height:3px;background:var(--bd2);border-radius:2px;overflow:hidden;flex-shrink:0}
.sfill{height:100%;background:var(--ac);border-radius:2px;transition:width .4s}
.theme-toggle{display:flex;background:var(--sf2);border:1px solid var(--bd);border-radius:20px;padding:3px;gap:2px;flex-shrink:0}
.tbtn{background:none;border:none;border-radius:14px;padding:2px 10px;font-size:11px;color:var(--txm);cursor:pointer;transition:all .2s;white-space:nowrap;font-family:inherit}
.tbtn.active{background:var(--ac);color:#fff;font-weight:600}
.hbtn{background:none;border:1px solid var(--bd);border-radius:8px;padding:5px 8px;color:var(--txm);cursor:pointer;display:flex;align-items:center;gap:4px;font-size:11px;font-family:inherit;transition:all .15s;flex-shrink:0}
.hbtn:hover{border-color:var(--ac);color:var(--ac);background:var(--acd)}

/* Toolbar */
.toolbar{background:var(--sf);border-bottom:1px solid var(--bd);padding:10px 1.25rem;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.sg{display:flex;gap:6px;flex:1;min-width:260px}
.sw{position:relative;flex:1}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--txf);pointer-events:none;display:flex}
.sinput{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r);padding:7px 10px 7px 30px;color:var(--tx);font-size:12px;outline:none;transition:border-color .2s,box-shadow .2s;font-family:inherit}
.sinput:focus{border-color:var(--ac);box-shadow:0 0 0 2px var(--acd)}
.sinput::placeholder{color:var(--txf)}
.ag{display:flex;gap:6px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r);font-size:12px;font-family:inherit;cursor:pointer;border:1px solid var(--bd);background:var(--sf2);color:var(--tx);transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--ac);color:var(--ac);background:var(--acd)}
.btn-p{background:var(--ac);border-color:var(--ac);color:#fff;font-weight:600}
.btn-p:hover{opacity:.88;color:#fff;background:var(--ac)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-gh{border-color:transparent;background:none}
.btn-gh:hover{border-color:var(--bd);background:var(--sf2)}

/* Subbar */
.subbar{background:var(--sf);border-bottom:1px solid var(--bd);padding:8px 1.25rem;display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:space-between}
.cat-bar{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.cl{font-size:11px;color:var(--txf);margin-right:2px;flex-shrink:0}
.chip{padding:3px 11px;border-radius:14px;font-size:11px;cursor:pointer;border:1px solid var(--bd);background:none;color:var(--txm);transition:all .15s;font-family:inherit}
.chip:hover,.chip.active{background:var(--acd);border-color:var(--ac);color:var(--ac);font-weight:600}
.sort-bar{display:flex;gap:4px;align-items:center;flex-shrink:0}
.sl{font-size:11px;color:var(--txf);margin-right:2px}
.sbtn{padding:3px 10px;border-radius:14px;font-size:11px;cursor:pointer;border:1px solid var(--bd);background:none;color:var(--txm);transition:all .15s;font-family:inherit}
.sbtn.active{background:var(--acd);border-color:var(--ac);color:var(--ac);font-weight:600}

/* Main */
main{padding:1.25rem;max-width:1080px;margin:0 auto}
.empty-state{text-align:center;padding:5rem 1rem;color:var(--txm)}
.empty-icon{font-size:42px;margin-bottom:1rem;opacity:.2}

/* Case card */
.case-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.case-card:hover{border-color:var(--bd2)}
.case-card.expanded{border-color:var(--acg)}
.ch{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;user-select:none}
.exp-ic{color:var(--txf);flex-shrink:0;transition:transform .2s;display:flex;align-items:center}
.case-card.expanded .exp-ic{transform:rotate(90deg);color:var(--ac)}
.cn{font-weight:600;font-size:13px;flex:1}
.cat-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;flex-shrink:0}
.pc-prev{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--txm);flex-shrink:0}
.cnt-b{background:var(--sf3);border:1px solid var(--bd);border-radius:10px;padding:1px 7px;font-size:10px;color:var(--txm);flex-shrink:0}
.c-acts{display:flex;gap:3px;opacity:0;transition:opacity .15s}
.ch:hover .c-acts{opacity:1}

/* Expanded body */
.exp-body{border-top:1px solid var(--bd);display:none}
.case-card.expanded .exp-body{display:block}

/* Milestones */
.ms-row{display:flex;align-items:center;gap:6px;padding:7px 12px;flex-wrap:wrap;border-bottom:1px solid var(--bd);background:var(--sf2)}
.ms-label{font-size:11px;color:var(--txf);flex-shrink:0;font-weight:600}
.ms-chips{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.ms-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:11px;border:1px solid var(--bd);background:var(--sf);cursor:pointer;font-family:inherit;transition:all .15s}
.ms-chip:hover{border-color:var(--bd2)}
.ms-chip.soon{border-color:var(--warn);background:var(--warnd);color:var(--warn)}
.ms-chip.urgent{border-color:var(--warn);background:var(--warnd);color:var(--warn)}
.ms-chip.overdue{border-color:var(--err);background:var(--errd);color:var(--err)}
.ms-chip.normal{color:var(--txm)}
.ms-x{background:none;border:none;cursor:pointer;color:inherit;opacity:.45;padding:0 0 0 3px;line-height:1;display:flex;align-items:center;font-size:14px}
.ms-x:hover{opacity:1}

/* Contact list */
.ci{display:flex;align-items:flex-start;gap:10px;padding:8px 12px 8px 42px;border-top:1px solid var(--bd);transition:background .15s}
.ci:hover{background:var(--sf2)}
.ci.hl{background:var(--acd)}
.av{width:30px;height:30px;border-radius:50%;background:var(--acd);color:var(--ac);border:1px solid var(--acg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.cb{flex:1;min-width:0}
.cnr{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px}
.cname{font-weight:600;font-size:12px}
.bp{font-size:9px;padding:1px 5px;border-radius:6px;background:var(--acd);color:var(--ac);border:1px solid var(--acg);font-weight:600}
.crole{font-size:10px;color:var(--txf)}
.cdet{display:flex;gap:10px;flex-wrap:wrap}
.df{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--txm)}
.cpbtn{background:none;border:none;cursor:pointer;color:var(--txf);padding:2px;border-radius:4px;display:flex;align-items:center;transition:all .15s}
.cpbtn:hover{color:var(--ac);background:var(--acd)}
.cnote{font-size:10px;color:var(--txf);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:380px}
.ca{display:flex;gap:3px;opacity:0;transition:opacity .15s;flex-shrink:0;margin-top:1px}
.ci:hover .ca{opacity:1}

/* Log section */
.log-sec{margin-top:6px}
.log-tog{background:none;border:none;cursor:pointer;font-size:10px;color:var(--txm);font-family:inherit;padding:1px 0;display:flex;align-items:center;gap:3px;transition:color .15s}
.log-tog:hover{color:var(--ac)}
.log-tog-ic{transition:transform .2s;display:flex;align-items:center}
.log-open .log-tog-ic{transform:rotate(90deg)}
.log-body{display:none;margin-top:5px;padding-left:10px;border-left:2px solid var(--bd)}
.log-open .log-body{display:block}
.log-item{padding:3px 0;position:relative;cursor:pointer}
.log-item:hover{opacity:.85}
.log-date{font-size:10px;color:var(--txf);font-weight:600}
.log-content{font-size:11px;color:var(--txm);white-space:pre-wrap;word-break:break-all}
.log-del{position:absolute;right:0;top:2px;background:none;border:none;cursor:pointer;color:var(--txf);opacity:0;transition:opacity .15s;display:flex}
.log-item:hover .log-del{opacity:1}
.log-del:hover{color:var(--err)}
.log-add-row{padding:4px 0}

/* Memo */
.memo-sec{border-top:1px solid var(--bd)}
.memo-tog{display:flex;align-items:center;gap:5px;padding:6px 12px;cursor:pointer;font-size:11px;color:var(--txm);background:none;border:none;font-family:inherit;width:100%;text-align:left;transition:color .15s}
.memo-tog:hover{color:var(--tx)}
.memo-ic{transition:transform .2s;display:flex;align-items:center}
.memo-open .memo-ic{transform:rotate(90deg);color:var(--ac)}
.memo-body{display:none;padding:0 12px 10px}
.memo-open .memo-body{display:block}
.memo-ta{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r);padding:8px;color:var(--tx);font-size:12px;font-family:inherit;outline:none;resize:vertical;min-height:72px;transition:border-color .2s}
.memo-ta:focus{border-color:var(--ac);box-shadow:0 0 0 2px var(--acd)}
.memo-ta::placeholder{color:var(--txf)}

.add-c-row{padding:7px 12px 7px 42px;background:var(--sf2)}

/* Icon buttons */
.ibtn{background:none;border:1px solid transparent;border-radius:6px;padding:4px;cursor:pointer;color:var(--txf);display:flex;align-items:center;transition:all .15s}
.ibtn:hover{color:var(--ac);border-color:var(--bd);background:var(--acd)}
.ibtn.del:hover{color:var(--err);border-color:rgba(239,83,80,.3);background:var(--errd)}

/* Modals */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:center;justify-content:center}
.mo.open{display:flex}
.md{background:var(--sf);border:1px solid var(--bd2);border-radius:var(--rx);width:100%;max-width:460px;margin:1rem;animation:fup .18s ease}
.md-w{max-width:520px}
@keyframes fup{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--bd)}
.mt{font-weight:700;font-size:14px}
.mcl{background:none;border:none;cursor:pointer;color:var(--txm);padding:4px;border-radius:6px;display:flex;transition:all .15s}
.mcl:hover{color:var(--tx);background:var(--sf2)}
.mb{padding:16px}
.mf{padding:12px 16px;border-top:1px solid var(--bd);display:flex;gap:6px;justify-content:flex-end}
.fg{margin-bottom:12px}
.fg:last-child{margin-bottom:0}
.fl{display:block;font-size:11px;color:var(--txm);margin-bottom:4px;font-weight:600;letter-spacing:.03em}
.fr{color:var(--ac)}
.fi,.fs,.fta{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r);padding:7px 10px;color:var(--tx);font-size:12px;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--ac);box-shadow:0 0 0 2px var(--acd)}
.fi::placeholder,.fta::placeholder{color:var(--txf)}
.fs{appearance:none;cursor:pointer}
.fs option{background:var(--sf);color:var(--tx)}
.fta{resize:vertical;min-height:72px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fck{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;color:var(--txm)}
.fck input{accent-color:var(--ac);width:14px;height:14px;cursor:pointer}

/* Settings cat list */
.scat-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:var(--r);margin-bottom:4px;background:var(--sf2);font-size:12px;border:1px solid var(--bd)}
.scat-name{display:flex;align-items:center;gap:8px}
.scat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--ac)}
.scat-add-row{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)}

/* Toast */
#toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:300;background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r);padding:9px 14px;font-size:12px;display:flex;align-items:center;gap:8px;animation:tsi .2s ease;box-shadow:0 6px 20px rgba(0,0,0,.4);pointer-events:none;max-width:300px}
@keyframes tsi{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}

mark{background:rgba(79,158,255,.22);color:var(--ac);border-radius:2px;padding:0 1px}
[data-theme=light] mark{background:rgba(26,111,196,.15)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

/* Print */
@media print{
  *{animation:none!important;transition:none!important}
  header .pill,header .theme-toggle,header .hbtn,
  .toolbar,.subbar,
  .c-acts,.c-acts,.ca,
  .ibtn,.btn,.cpbtn,.ms-x,
  .log-tog,.log-del,.log-add-row,
  .add-c-row,.memo-tog,#toast{display:none!important}
  body{background:#fff;color:#000;font-size:12px}
  header{position:relative;height:auto;padding:8px 16px;border-bottom:2px solid #333;margin-bottom:12pt}
  .logo{color:#000;font-size:16px}
  main{padding:0;max-width:100%}
  .case-card{border:1px solid #bbb;border-radius:4px;margin-bottom:10pt;break-inside:avoid;page-break-inside:avoid}
  .case-card.expanded{border-color:#888}
  .exp-body,.log-body{display:block!important}
  .ch{background:#f0f0f0;padding:6px 10px;cursor:default}
  .exp-ic,.pc-prev,.cnt-b{display:none}
  .cn{font-size:13px;font-weight:700;color:#000}
  .cat-badge{border:1px solid #999;background:none!important;color:#333!important}
  .ms-row{background:#fafafa;padding:5px 10px}
  .ms-chip{background:none;border:1px solid #999;color:#333}
  .ci{padding:5px 10px;border-top:1px solid #ddd}
  .ci:hover{background:none}
  .av{background:#e8f0ff;color:#1a6fc4;border-color:#b0c8ee}
  .cname{color:#000}
  .crole,.df,.cnote,.log-date,.log-content{color:#444}
  .log-sec{margin-top:4px}
  .log-body{margin-top:4px;border-left:2px solid #ccc;padding-left:8px}
  .memo-sec{border-top:1px solid #ddd}
  .memo-body{display:block!important;padding:6px 10px 8px}
  .memo-ta{border:1px solid #ccc;background:none;color:#000;resize:none}
}
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    </div>
    contact control
  </div>
  <div class="hsp"></div>
  <div class="pill" id="sunrisePill" style="display:none">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/></svg>
    <span id="sunriseText"></span>
  </div>
  <div class="pill">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
    <span id="storageText">—</span>
    <div class="sbar"><div class="sfill" id="storageFill"></div></div>
  </div>
  <div class="theme-toggle">
    <button class="tbtn" id="btnAuto"  onclick="setThemeMode('auto')">自動</button>
    <button class="tbtn" id="btnLight" onclick="setThemeMode('light')">淺色</button>
    <button class="tbtn" id="btnDark"  onclick="setThemeMode('dark')">深色</button>
  </div>
  <button class="hbtn" onclick="openSettings()" title="類別管理">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 0-14.14 0M4.93 19.07a10 10 0 0 0 14.14 0M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
    類別管理
  </button>
</header>

<!-- Toolbar -->
<div class="toolbar">
  <div class="sg">
    <div class="sw">
      <span class="si"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
      <input class="sinput" id="searchCase" placeholder="搜尋案件… (Enter)" type="search" autocomplete="off">
    </div>
    <div class="sw">
      <span class="si"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
      <input class="sinput" id="searchContact" placeholder="搜尋聯絡人… (Enter)" type="search" autocomplete="off">
    </div>
  </div>
  <div class="ag">
    <button class="btn btn-p" onclick="openCaseModal()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      新增案件
    </button>
    <button class="btn" onclick="exportJSON()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      匯出 JSON
    </button>
    <button class="btn" onclick="triggerImport()">

<script>
const STORAGE_KEY = 'caseManager_v3';
const DEFAULT_CATS = ['環評','環差','監測','許可申請','土污','廢棄物','溫室氣體','其他'];
const CAT_COL = {
  '環評':    ['rgba(79,158,255,.15)','#4f9eff'],
  '環差':    ['rgba(155,89,182,.15)','#a86fd0'],
  '監測':    ['rgba(29,158,117,.15)','#1d9e75'],
  '許可申請':['rgba(230,126,34,.15)','#e07b1a'],
  '土污':    ['rgba(192,57,43,.15)', '#c0392b'],
  '廢棄物':  ['rgba(120,130,150,.15)','#8090a0'],
  '溫室氣體':['rgba(39,174,96,.15)', '#27ae60'],
  '其他':    ['rgba(120,130,150,.15)','#8090a0'],
};

let db = { categories: [...DEFAULT_CATS], cases: [] };
let sortKey = 'newest';
let filterCategory = '';
let searchCaseQ = '';
let searchCtQ = '';
let themeMode = localStorage.getItem('themeMode') || 'auto';

/* ── Data ── */
function loadData() {
  try {
    const r = localStorage.getItem(STORAGE_KEY);
    if (r) db = JSON.parse(r);
    if (!db.categories) db.categories = [...DEFAULT_CATS];
    db.cases.forEach(c => {
      if (!c.milestones) c.milestones = [];
      if (!c.contacts) c.contacts = [];
      if (c.memo === undefined) c.memo = '';
      if (!c.createdAt) c.createdAt = Date.now();
      c.contacts.forEach(ct => { if (!ct.logs) ct.logs = []; });
    });
  } catch(e) { db = { categories: [...DEFAULT_CATS], cases: [] }; }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(stripRuntime(db)));
  updateStorage();
}

function stripRuntime(dbObj) {
  return {
    categories: dbObj.categories,
    cases: dbObj.cases.map(c => {
      const { _exp, _memo, ...rest } = c;
      return rest;
    })
  };
}

function updateStorage() {
  const raw = localStorage.getItem(STORAGE_KEY) || '';
  const bytes = new TextEncoder().encode(raw).length;
  const kb = (bytes / 1024).toFixed(1);
  const pct = Math.min(100, (bytes / (5 * 1024 * 1024)) * 100);
  document.getElementById('storageText').textContent = `${kb} KB / 5 MB`;
  const fill = document.getElementById('storageFill');
  fill.style.width = pct.toFixed(1) + '%';
  fill.style.background = pct > 80 ? 'var(--err)' : pct > 50 ? 'var(--warn)' : 'var(--ac)';
}

/* ── Theme / Sunrise ── */
function getSunTimes() {
  const twStr = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Taipei' });
  const [yr, mo, dy] = twStr.split('-').map(Number);
  const dayOfYear = Math.round((new Date(yr, mo - 1, dy) - new Date(yr, 0, 0)) / 86400000);
  const lat = 24.1477 * Math.PI / 180;
  const decl = -23.45 * Math.cos(2 * Math.PI / 365 * (dayOfYear + 10)) * Math.PI / 180;
  const cosH = -Math.tan(lat) * Math.tan(decl);
  const Hdeg = Math.acos(Math.max(-1, Math.min(1, cosH))) * 180 / Math.PI;
  const solarNoon = 12 - (120.6736 - 120) / 15;
  return { riseH: solarNoon - Hdeg / 15, setH: solarNoon + Hdeg / 15 };
}

function toHHMM(h) {
  const hh = Math.floor(h), mm = Math.round((h - hh) * 60);
  return `${String(hh).padStart(2,'0')}:${String(mm % 60).padStart(2,'0')}`;
}

function applyTheme() {
  let dark = false;
  const pill = document.getElementById('sunrisePill');
  if (themeMode === 'dark') { dark = true; pill.style.display = 'none'; }
  else if (themeMode === 'light') { dark = false; pill.style.display = 'none'; }
  else {
    const { riseH, setH } = getSunTimes();
    const twNow = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
    const cur = twNow.getHours() + twNow.getMinutes() / 60;
    dark = cur < riseH || cur >= setH;
    document.getElementById('sunriseText').textContent = `台中 日出 ${toHHMM(riseH)} · 日落 ${toHHMM(setH)}`;
    pill.style.display = 'flex';
  }
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
}

function setThemeMode(mode) {
  themeMode = mode;
  localStorage.setItem('themeMode', mode);
  applyTheme();
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
  document.getElementById({ auto: 'btnAuto', light: 'btnLight', dark: 'btnDark' }[mode]).classList.add('active');
}

/* ── Utilities ── */
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function hl(text, q) {
  if (!q) return escHtml(text);
  const e = escHtml(text), eq = escHtml(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return e.replace(new RegExp(eq,'gi'), m => `<mark>${m}</mark>`);
}
function initials(n) { const c=[...(n||'').trim()]; return c.length>=2?c[0]+c[c.length-1]:c[0]||'?'; }
function todayStr() { return new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Taipei'}); }

function urgency(dateStr) {
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  const diff = (d - today) / 86400000;
  if (diff < 0) return 'overdue';
  if (diff <= 7) return 'urgent';
  if (diff <= 30) return 'soon';
  return 'normal';
}

function nearestMs(c) {
  const today = new Date(); today.setHours(0,0,0,0);
  const future = (c.milestones||[]).map(m=>new Date(m.date)).filter(d=>{ const x=new Date(d); x.setHours(0,0,0,0); return x>=today; });
  if (!future.length) return Infinity;
  return Math.min(...future.map(d=>d.getTime()));
}

/* ── Category bar ── */
function renderCatBar() {
  const bar = document.getElementById('catBar');
  const all = `<button class="chip ${filterCategory===''?'active':''}" onclick="doFilterCat(this,'')">全部</button>`;
  const chips = db.categories.map(c => `<button class="chip ${filterCategory===c?'active':''}" onclick="doFilterCat(this,'${escHtml(c)}')">${escHtml(c)}</button>`).join('');
  bar.innerHTML = all + chips;
}

function doFilterCat(el, cat) {
  filterCategory = cat;
  document.querySelectorAll('#catBar .chip').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function renderCatSelect(selEl, current) {
  selEl.innerHTML = '<option value="">— 請選擇 —</option>' +
    db.categories.map(c => `<option value="${escHtml(c)}" ${c===current?'selected':''}>${escHtml(c)}</option>`).join('');
}

/* ── Sort ── */
function setSort(el, key) {
  sortKey = key;
  document.querySelectorAll('.sbtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function sortedCases(cases) {
  const arr = [...cases];
  if (sortKey === 'newest') return arr.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
  if (sortKey === 'oldest') return arr.sort((a,b) => (a.createdAt||0) - (b.createdAt||0));
  if (sortKey === 'name') return arr.sort((a,b) => a.name.localeCompare(b.name,'zh-TW'));
  if (sortKey === 'cat') return arr.sort((a,b) => (a.category||'').localeCompare(b.category||'','zh-TW'));
  if (sortKey === 'ms') return arr.sort((a,b) => nearestMs(a) - nearestMs(b));
  return arr;
}

/* ── Render ── */
function render() {
  const list = document.getElementById('caseList');
  let cases = db.cases;
  if (filterCategory) cases = cases.filter(c => c.category === filterCategory);
  if (searchCaseQ) cases = cases.filter(c => c.name.toLowerCase().includes(searchCaseQ.toLowerCase()));
  if (searchCtQ) {
    const q = searchCtQ.toLowerCase();
    cases = cases.filter(c => (c.contacts||[]).some(ct => ct.name.toLowerCase().includes(q)));
  }
  cases = sortedCases(cases);

  if (!cases.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📁</div><p>${!db.cases.length?'尚無案件，點選「新增案件」開始建立':'找不到符合條件的案件'}</p></div>`;
    return;
  }
  list.innerHTML = cases.map(renderCase).join('');
}

function renderCase(c) {
  const contacts = c.contacts || [];
  const primary = contacts.find(ct => ct.primary);
  const col = c.category ? (CAT_COL[c.category] || ['var(--acd)','var(--ac)']) : null;
  const msHtml = renderMilestones(c);
  const ctHtml = contacts.map(ct => renderContact(c.id, ct)).join('');

  return `<div class="case-card ${c._exp?'expanded':''}" id="cc-${c.id}">
    <div class="ch" onclick="toggleCase('${c.id}')">
      <div class="exp-ic"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></div>
      <div class="cn">${hl(c.name, searchCaseQ)}</div>
      ${col?`<span class="cat-badge" style="background:${col[0]};color:${col[1]}">${escHtml(c.category)}</span>`:''}
      ${primary?`<div class="pc-prev"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${escHtml(primary.name)}</div>`:''}
      <span class="cnt-b">${contacts.length} 位</span>
      <div class="c-acts" onclick="event.stopPropagation()">
        <button class="ibtn" onclick="openCaseModal('${c.id}')" title="編輯案件"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="ibtn del" onclick="deleteCase('${c.id}')" title="刪除案件"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
      </div>
    </div>
    <div class="exp-body">
      ${msHtml}
      ${ctHtml}
      <div class="add-c-row">
        <button class="btn btn-sm btn-gh" onclick="openContactModal('${c.id}')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> 新增聯絡人</button>
      </div>
      <div class="memo-sec ${c._memo?'memo-open':''}">
        <button class="memo-tog" onclick="toggleMemo('${c.id}')">
          <span class="memo-ic"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></span>
          備忘欄 ${c.memo?'<span style="color:var(--ac);font-size:10px">●</span>':''}
        </button>
        <div class="memo-body">
          <textarea class="memo-ta" placeholder="公文字號、注意事項、其他備忘…" onblur="saveMemo('${c.id}',this.value)">${escHtml(c.memo||'')}</textarea>
        </div>
      </div>
    </div>
  </div>`;
}

function renderMilestones(c) {
  const mss = c.milestones || [];
  const chips = mss.map(m => {
    const urg = urgency(m.date);
    const animCls = urg==='overdue'?' bl-fast':urg==='urgent'?' bl-slow':'';
    return `<span class="ms-chip ${urg}${animCls}" onclick="openMsModal('${c.id}','${m.id}')">
      ${escHtml(m.label)} · ${m.date}
      <button class="ms-x" onclick="event.stopPropagation();deleteMilestone('${c.id}','${m.id}')" title="刪除">×</button>
    </span>`;
  }).join('');
  return `<div class="ms-row">
    <span class="ms-label"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-1px;margin-right:3px"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>期程</span>
    <div class="ms-chips">${chips}</div>
    <button class="btn btn-sm btn-gh" onclick="openMsModal('${c.id}')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> 新增期程</button>
  </div>`;
}

function renderContact(caseId, ct) {
  const isMatch = searchCtQ && ct.name.toLowerCase().includes(searchCtQ.toLowerCase());
  const logs = ct.logs || [];
  const logsHtml = logs.length ? logs.sort((a,b)=>b.date.localeCompare(a.date)).map(l =>
    `<div class="log-item">
      <div class="log-date">${escHtml(l.date)}</div>
      <div class="log-content">${escHtml(l.content)}</div>
      <button class="log-del" onclick="deleteLog('${caseId}','${ct.id}','${l.id}')" title="刪除"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>`).join('') : '<div style="font-size:10px;color:var(--txf);padding:2px 0">尚無記錄</div>';

  return `<div class="ci ${isMatch?'hl':''}">
    <div class="av">${initials(ct.name)}</div>
    <div class="cb">
      <div class="cnr">
        <span class="cname">${hl(ct.name, searchCtQ)}</span>
        ${ct.primary?'<span class="bp">主要</span>':''}
        ${ct.role?`<span class="crole">${escHtml(ct.role)}</span>`:''}
      </div>
      <div class="cdet">
        ${ct.phone?`<span class="df"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8 9.91a16 16 0 0 0 6 6l.86-.86a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>${escHtml(ct.phone)}<button class="cpbtn" onclick="copyText(${JSON.stringify(ct.phone)},'電話')" title="複製"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></span>`:''}
        ${ct.email?`<span class="df"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>${escHtml(ct.email)}<button class="cpbtn" onclick="copyText(${JSON.stringify(ct.email)},'Email')" title="複製"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></span>`:''}
      </div>
      ${ct.note?`<div class="cnote" title="${escHtml(ct.note)}">${escHtml(ct.note)}</div>`:''}
      <div class="log-sec ${ct._logsOpen?'log-open':''}">
        <button class="log-tog" onclick="toggleLogs('${caseId}','${ct.id}')">
          <span class="log-tog-ic"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></span>
          聯絡記錄（${logs.length} 筆）
        </button>
        <div class="log-body">
          ${logsHtml}
          <div class="log-add-row"><button class="btn btn-sm btn-gh" onclick="openLogModal('${caseId}','${ct.id}')"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> 新增記錄</button></div>
        </div>
      </div>
    </div>
    <div class="ca">
      <button class="ibtn" onclick="openContactModal('${caseId}','${ct.id}')" title="編輯"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
      <button class="ibtn del" onclick="deleteContact('${caseId}','${ct.id}')" title="刪除"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
    </div>
  </div>`;
}

/* ── Toggle ── */
function toggleCase(id) {
  const c = db.cases.find(c=>c.id===id); if(!c) return;
  c._exp = !c._exp; render();
}
function toggleMemo(id) {
  const el = document.querySelector(`#cc-${id} .memo-sec`);
  if (!el) return;
  const c = db.cases.find(c=>c.id===id); if(!c) return;
  c._memo = !c._memo;
  el.classList.toggle('memo-open', c._memo);
}
function toggleLogs(caseId, ctId) {
  const c = db.cases.find(c=>c.id===caseId); if(!c) return;
  const ct = c.contacts.find(ct=>ct.id===ctId); if(!ct) return;
  ct._logsOpen = !ct._logsOpen; render();
}

/* ── Case CRUD ── */
function openCaseModal(id) {
  document.getElementById('caseMT').textContent = id ? '編輯案件' : '新增案件';
  document.getElementById('caseId').value = id || '';
  const c = id ? db.cases.find(c=>c.id===id) : null;
  document.getElementById('caseName').value = c ? c.name : '';
  document.getElementById('caseNote').value = c ? (c.note||'') : '';
  renderCatSelect(document.getElementById('caseCat'), c ? c.category : '');
  openMo('caseModal');
  setTimeout(() => document.getElementById('caseName').focus(), 80);
}
function saveCase() {
  const name = document.getElementById('caseName').value.trim();
  if (!name) { showToast('⚠ 請輸入案件名稱','warn'); return; }
  const id = document.getElementById('caseId').value;
  const category = document.getElementById('caseCat').value;
  const note = document.getElementById('caseNote').value.trim();
  if (id) { const c=db.cases.find(c=>c.id===id); if(c){c.name=name;c.category=category;c.note=note;} }
  else { db.cases.unshift({id:uid(),name,category,note,memo:'',milestones:[],contacts:[],createdAt:Date.now(),_exp:true}); }
  saveData(); render(); closeMo('caseModal'); showToast(id?'✓ 案件已更新':'✓ 案件已新增');
}

/* ── Contact CRUD ── */
function openContactModal(caseId, ctId) {
  document.getElementById('contactMT').textContent = ctId ? '編輯聯絡人' : '新增聯絡人';
  document.getElementById('ctCaseId').value = caseId;
  document.getElementById('ctId').value = ctId || '';
  const c = db.cases.find(c=>c.id===caseId);
  const ct = ctId && c ? c.contacts.find(ct=>ct.id===ctId) : null;
  ['ctName','ctRole','ctPhone','ctEmail','ctNote'].forEach(id => document.getElementById(id).value = ct ? (ct[id.slice(2).toLowerCase()]||'') : '');
  if (ct) {
    document.getElementById('ctName').value = ct.name || '';
    document.getElementById('ctRole').value = ct.role || '';
    document.getElementById('ctPhone').value = ct.phone || '';
    document.getElementById('ctEmail').value = ct.email || '';
    document.getElementById('ctNote').value = ct.note || '';
  }
  document.getElementById('ctPrimary').checked = ct ? !!ct.primary : false;
  openMo('contactModal');
  setTimeout(() => document.getElementById('ctName').focus(), 80);
}
function saveContact() {
  const name = document.getElementById('ctName').value.trim();
  if (!name) { showToast('⚠ 請輸入姓名','warn'); return; }
  const caseId = document.getElementById('ctCaseId').value;
  const ctId = document.getElementById('ctId').value;
  const c = db.cases.find(c=>c.id===caseId); if(!c) return;
  const isPrimary = document.getElementById('ctPrimary').checked;
  if (isPrimary) c.contacts.forEach(ct=>ct.primary=false);
  const payload = { name, role:document.getElementById('ctRole').value.trim(), phone:document.getElementById('ctPhone').value.trim(), email:document.getElementById('ctEmail').value.trim(), note:document.getElementById('ctNote').value.trim(), primary:isPrimary };
  if (ctId) { const ct=c.contacts.find(ct=>ct.id===ctId); if(ct) Object.assign(ct,payload); }
  else { c.contacts.push({id:uid(),logs:[],...payload}); }
  c._exp = true;
  saveData(); render(); closeMo('contactModal'); showToast(ctId?'✓ 聯絡人已更新':'✓ 聯絡人已新增');
}

/* ── Milestone CRUD ── */
function openMsModal(caseId, msId) {
  document.getElementById('msMT').textContent = msId ? '編輯期程' : '新增期程';
  document.getElementById('msCaseId').value = caseId;
  document.getElementById('msId').value = msId || '';
  const c = db.cases.find(c=>c.id===caseId);
  const m = msId && c ? c.milestones.find(m=>m.id===msId) : null;
  document.getElementById('msLabel').value = m ? m.label : '';
  document.getElementById('msDate').value = m ? m.date : todayStr();
  openMo('msModal');
  setTimeout(() => document.getElementById('msLabel').focus(), 80);
}
function saveMilestone() {
  const label = document.getElementById('msLabel').value.trim();
  const date = document.getElementById('msDate').value;
  if (!label || !date) { showToast('⚠ 請填入名稱與日期','warn'); return; }
  const caseId = document.getElementById('msCaseId').value;
  const msId = document.getElementById('msId').value;
  const c = db.cases.find(c=>c.id===caseId); if(!c) return;
  if (msId) { const m=c.milestones.find(m=>m.id===msId); if(m){m.label=label;m.date=date;} }
  else { c.milestones.push({id:uid(),label,date}); }
  c._exp = true;
  saveData(); render(); closeMo('msModal'); showToast(msId?'✓ 期程已更新':'✓ 期程已新增');
}
function deleteMilestone(caseId, msId) {
  const c = db.cases.find(c=>c.id===caseId); if(!c) return;
  if (!confirm('確定刪除此期程？')) return;
  c.milestones = c.milestones.filter(m=>m.id!==msId);
  saveData(); render();
}

/* ── Log CRUD ── */
function openLogModal(caseId, ctId, logId) {
  document.getElementById('logMT').textContent = logId ? '編輯聯絡記錄' : '新增聯絡記錄';
  document.getElementById('logCaseId').value = caseId;
  document.getElementById('logCtId').value = ctId;
  document.getElementById('logId').value = logId || '';
  const c = db.cases.find(c=>c.id===caseId);
  const ct = c && c.contacts.find(ct=>ct.id===ctId);
  const log = logId && ct ? ct.logs.find(l=>l.id===logId) : null;
  document.getElementById('logDate').value = log ? log.date : todayStr();
  document.getElementById('logContent').value = log ? log.content : '';
  openMo('logModal');
  setTimeout(() => document.getElementById('logContent').focus(), 80);
}
function saveLog() {
  const date = document.getElementById('logDate').value;
  const content = document.getElementById('logContent').value.trim();
  if (!date || !content) { showToast('⚠ 請填入日期與內容','warn'); return; }
  const caseId = document.getElementById('logCaseId').value;
  const ctId = document.getElementById('logCtId').value;
  const logId = document.getElementById('logId').value;
  const c = db.cases.find(c=>c.id===caseId); if(!c) return;
  const ct = c.contacts.find(ct=>ct.id===ctId); if(!ct) return;
  if (logId) { const l=ct.logs.find(l=>l.id===logId); if(l){l.date=date;l.content=content;} }
  else { ct.logs.push({id:uid(),date,content}); ct._logsOpen=true; }
  c._exp = true;
  saveData(); render(); closeMo('logModal'); showToast(logId?'✓ 記錄已更新':'✓ 記錄已新增');
}
function deleteLog(caseId, ctId, logId) {
  const c = db.cases.find(c=>c.id===caseId); if(!c) return;
  const ct = c.contacts.find(ct=>ct.id===ctId); if(!ct) return;
  if (!confirm('確定刪除此聯絡記錄？')) return;
  ct.logs = ct.logs.filter(l=>l.id!==logId);
  saveData(); render();
}

/* ── Delete ── */
function deleteCase(id) {
  const c = db.cases.find(c=>c.id===id); if(!c) return;
  if (!confirm(`確定刪除案件「${c.name}」及其所有資料？`)) return;
  db.cases = db.cases.filter(c=>c.id!==id);
  saveData(); render(); showToast('案件已刪除','warn');
}
function deleteContact(caseId, ctId) {
  const c = db.cases.find(c=>c.id===caseId); if(!c) return;
  const ct = c.contacts.find(ct=>ct.id===ctId); if(!ct) return;
  if (!confirm(`確定刪除聯絡人「${ct.name}」？`)) return;
  c.contacts = c.contacts.filter(ct=>ct.id!==ctId);
  saveData(); render(); showToast('聯絡人已刪除','warn');
}

/* ── Memo ── */
function saveMemo(caseId, val) {
  const c = db.cases.find(c=>c.id===caseId); if(!c) return;
  if (c.memo !== val) { c.memo = val; saveData(); }
}

/* ── Settings (Category) ── */
function openSettings() {
  renderCatList();
  openMo('settingsModal');
  setTimeout(() => document.getElementById('newCatInput').focus(), 80);
}

function renderCatList() {
  document.getElementById('catList').innerHTML = db.categories.map(cat => `
    <div class="scat-item">
      <div class="scat-name"><div class="scat-dot" style="background:${(CAT_COL[cat]||['','var(--ac)'])[1]}"></div>${escHtml(cat)}</div>
      <button class="ibtn del" onclick="deleteCategory('${escHtml(cat)}')" title="刪除類別"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
    </div>`).join('');
}

function addCategory() {
  const val = document.getElementById('newCatInput').value.trim();
  if (!val) return;
  if (db.categories.includes(val)) { showToast('⚠ 此類別已存在','warn'); return; }
  db.categories.push(val);
  document.getElementById('newCatInput').value = '';
  saveData(); renderCatBar(); renderCatList(); showToast(`✓ 已新增類別「${val}」`);
}

function deleteCategory(cat) {
  const used = db.cases.filter(c=>c.category===cat).length;
  const msg = used ? `有 ${used} 個案件使用此類別，刪除後類別將清空。確定刪除「${cat}」？` : `確定刪除類別「${cat}」？`;
  if (!confirm(msg)) return;
  if (used) db.cases.forEach(c=>{ if(c.category===cat) c.category=''; });
  db.categories = db.categories.filter(c=>c!==cat);
  saveData(); renderCatBar(); renderCatList(); render(); showToast(`類別「${cat}」已刪除`,'warn');
}

/* ── Modal ── */
function openMo(id) { document.getElementById(id).classList.add('open'); }
function closeMo(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.mo').forEach(el => el.addEventListener('click', e => { if(e.target===e.currentTarget) e.currentTarget.classList.remove('open'); }));

/* ── Search ── */
function setupSearch() {
  const cEl = document.getElementById('searchCase'), ctEl = document.getElementById('searchContact');
  cEl.addEventListener('keydown', e => { if(e.key==='Enter'){searchCaseQ=e.target.value.trim();render();} });
  cEl.addEventListener('input', e => { if(!e.target.value){searchCaseQ='';render();} });
  ctEl.addEventListener('keydown', e => {
    if (e.key==='Enter') {
      searchCtQ = e.target.value.trim();
      if (searchCtQ) { const q=searchCtQ.toLowerCase(); db.cases.forEach(c=>{ if((c.contacts||[]).some(ct=>ct.name.toLowerCase().includes(q))) c._exp=true; }); }
      render();
    }
  });
  ctEl.addEventListener('input', e => { if(!e.target.value){searchCtQ='';render();} });
}

/* ── Copy / Toast ── */
function copyText(text, label) {
  navigator.clipboard.writeText(text).then(()=>showToast(`✓ ${label} 已複製`)).catch(()=>showToast('複製失敗','warn'));
}
let _tt;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.style.display = 'flex';
  t.innerHTML = `<span style="color:${type==='warn'?'var(--warn)':'var(--ok)'}">●</span><span>${escHtml(msg)}</span>`;
  clearTimeout(_tt); _tt = setTimeout(() => t.style.display='none', 2800);
}

/* ── Export / Import / Print ── */
function exportJSON() {
  const blob = new Blob([JSON.stringify(stripRuntime(db), null, 2)], {type:'application/json'});
  dlBlob(blob, `contact_control_${todayStr()}.json`);
  showToast('✓ JSON 匯出完成（可上傳 GitHub 備份）');
}
function triggerImport() { document.getElementById('importInput').click(); }
function importJSON(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imp = JSON.parse(ev.target.result);
      if (!Array.isArray(imp.cases)) throw new Error();
      if (!confirm(`確定匯入？現有 ${db.cases.length} 筆案件將被覆蓋。`)) return;
      db = imp;
      if (!db.categories) db.categories = [...DEFAULT_CATS];
      db.cases.forEach(c => {
        if (!c.milestones) c.milestones=[];
        if (!c.contacts) c.contacts=[];
        if (c.memo===undefined) c.memo='';
        if (!c.createdAt) c.createdAt=Date.now();
        c.contacts.forEach(ct=>{ if(!ct.logs) ct.logs=[]; });
      });
      saveData(); renderCatBar(); render(); showToast(`✓ 已匯入 ${db.cases.length} 筆案件`);
    } catch { showToast('⚠ 匯入失敗：請確認為有效 JSON 備份','warn'); }
    e.target.value='';
  };
  reader.readAsText(file);
}
function exportCSV() {
  const rows=[['案件名稱','類別','案件備註','期程名稱','期程日期','聯絡人','職位','電話','Email','聯絡人備註','主要']];
  db.cases.forEach(c=>{
    const mss=c.milestones||[], cts=c.contacts||[];
    if(!cts.length&&!mss.length){ rows.push([c.name,c.category||'',c.note||'','','','','','','','','']); return; }
    const msStr=mss.map(m=>`${m.label}(${m.date})`).join('；');
    if(!cts.length){ rows.push([c.name,c.category||'',c.note||'',msStr,'','','','','','','']); return; }
    cts.forEach(ct=>{ rows.push([c.name,c.category||'',c.note||'',msStr,'',ct.name,ct.role||'',ct.phone||'',ct.email||'',ct.note||'',ct.primary?'是':'']); });
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  dlBlob(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}), `contact_control_${todayStr()}.csv`);
  showToast('✓ CSV 匯出完成（可直接用 Excel 開啟）');
}
function dlBlob(blob, name) { const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:name}); a.click(); }

function printView() {
  db.cases.forEach(c=>c._exp=true);
  render();
  setTimeout(()=>window.print(), 150);
}

/* ── Keyboard ── */
document.addEventListener('keydown', e => {
  if (e.key==='Escape') { document.querySelectorAll('.mo.open').forEach(m=>m.classList.remove('open')); }
  if ((e.ctrlKey||e.metaKey)&&e.key==='n') { e.preventDefault(); openCaseModal(); }
});

/* ── Init ── */
loadData();
setThemeMode(themeMode);
setupSearch();
updateStorage();
renderCatBar();
render();
setInterval(()=>{ if(themeMode==='auto') applyTheme(); }, 60000);
</script>
