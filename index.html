<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>contact control</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="m-orb-mid" aria-hidden="true"></div>

<header>
  <div class="logo">
    <div class="lic"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>
    <span>contact control</span>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="tabCases" onclick="setView('cases')">案件</button>
    <button class="nav-tab" id="tabDir" onclick="setView('directory')">名冊</button>
    <button class="nav-tab" id="tabTimeline" onclick="setView('timeline')">時間軸</button>
  </div>
  <div class="hsp"></div>
  <div class="ds-pill ds-loading" id="dsPill">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span id="dsPillText">讀取中…</span>
  </div>
  <div class="pill" id="sunrisePill" style="display:none">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/></svg>
    <span id="sunriseText"></span>
  </div>
  <div class="pill">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
    <span id="storageText">—</span>
    <div class="sbar"><div class="sfill" id="storageFill"></div></div>
  </div>
  <div class="tg">
    <button class="tb" id="btnAuto"  onclick="setThemeMode('auto')">自動</button>
    <button class="tb" id="btnLight" onclick="setThemeMode('light')">淺色</button>
    <button class="tb" id="btnDark"  onclick="setThemeMode('dark')">深色</button>
  </div>
  <button class="hbtn" onclick="openSettings()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 0-14.14 0M4.93 19.07a10 10 0 0 0 14.14 0M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
    <span>類別</span>
  </button>
</header>

<!-- Toolbar (changes by view) -->
<div class="toolbar" id="toolbar"></div>

<!-- Main layout -->
<div class="layout" id="mainLayout">
  <div class="lp" id="lp">
    <div class="lp-top" id="lpTop"></div>
    <div class="lp-list" id="lpList"></div>
    <div class="lp-bottom" id="lpBottom"></div>
  </div>
  <div class="rp" id="rp">
    <div class="rp-empty"><div class="rp-empty-icon">📋</div><p class="rp-empty-txt">點選左側查看詳情</p></div>
  </div>
</div>

<!-- Case Modal -->
<div class="mo" id="caseModal">
  <div class="md">
    <div class="mh"><span class="mt" id="caseMT">新增案件</span><button class="mcl" onclick="closeMo('caseModal')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="mb">
      <input type="hidden" id="caseId">
      <div class="fg"><label class="fl">案件名稱 <span class="fr">*</span></label><input class="fi" id="caseName" placeholder="例：○○廠 環境影響評估"></div>
      <div class="frow">
        <div class="fg"><label class="fl">案件類別</label><select class="fs" id="caseCat"></select></div>
        <div class="fg"><label class="fl">案件狀態</label>
          <select class="fs" id="caseStatus">
            <option value="進行中">進行中</option>
            <option value="待辦">待辦</option>
            <option value="暫停">暫停</option>
            <option value="結案">結案</option>
          </select>
        </div>
      </div>
      <div class="fg"><label class="fl">備註</label><input class="fi" id="caseNote" placeholder="選填"></div>
    </div>
    <div class="mf"><button class="btn" onclick="closeMo('caseModal')">取消</button><button class="btn btn-p" onclick="saveCase()">儲存</button></div>
  </div>
</div>

<!-- Global Contact Modal (Directory) -->
<div class="mo" id="gContactModal">
  <div class="md">
    <div class="mh"><span class="mt" id="gContactMT">新增聯絡人</span><button class="mcl" onclick="closeMo('gContactModal')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="mb">
      <input type="hidden" id="gCtId">
      <div class="frow">
        <div class="fg"><label class="fl">姓名 <span class="fr">*</span></label><input class="fi" id="gCtName" placeholder="王小明"></div>
        <div class="fg"><label class="fl">身份 / 職位</label><input class="fi" id="gCtRole" placeholder="業主、承辦…"></div>
      </div>
      <div class="fg"><label class="fl">角色類別</label><input class="fi" id="gCtType" placeholder="業主、下包（空品監測）、規劃團隊…"></div>
      <div class="fg"><label class="fl">說明</label><textarea class="fta" id="gCtDesc" placeholder="負責範疇、對接事項…"></textarea></div>
      <div class="frow">
        <div class="fg"><label class="fl">電話</label><input class="fi" id="gCtPhone" type="tel" placeholder="0900-000-000"></div>
        <div class="fg"><label class="fl">Email</label><input class="fi" id="gCtEmail" type="email" placeholder="example@mail.com"></div>
      </div>
      <div class="fg"><label class="fl">備註</label><textarea class="fta" id="gCtNote" placeholder="其他補充…" style="min-height:52px"></textarea></div>
    </div>
    <div class="mf"><button class="btn" onclick="closeMo('gContactModal')">取消</button><button class="btn btn-p" onclick="saveGContact()">儲存</button></div>
  </div>
</div>

<!-- Case Contact Ref Modal (with autocomplete picker) -->
<div class="mo" id="refModal">
  <div class="md">
    <div class="mh"><span class="mt" id="refMT">新增聯絡人</span><button class="mcl" onclick="closeMo('refModal')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="mb">
      <input type="hidden" id="refId">
      <input type="hidden" id="refCaseId">
      <input type="hidden" id="refPickedGId">
      <div class="fsection-label">── 基本資料（來自名冊或新建）</div>
      <div class="frow">
        <div class="fg">
          <label class="fl">姓名 <span class="fr">*</span></label>
          <div class="ac-wrap">
            <input class="fi" id="refName" placeholder="輸入姓名搜尋名冊…" autocomplete="off" oninput="onRefNameInput(this.value)" onblur="hideAcDelay()">
            <div class="ac-dropdown" id="refAcDrop"></div>
          </div>
          <div class="linked-indicator" id="refLinked">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            已連結名冊 · 修改將同步更新
          </div>
        </div>
        <div class="fg"><label class="fl">身份 / 職位</label><input class="fi" id="refRole" placeholder="業主、承辦…"></div>
      </div>
      <div class="fg"><label class="fl">角色類別</label><input class="fi" id="refType" placeholder="業主、下包（空品監測）、規劃團隊…"></div>
      <div class="fg"><label class="fl">說明</label><textarea class="fta" id="refDesc" placeholder="負責範疇、對接事項…"></textarea></div>
      <div class="frow">
        <div class="fg"><label class="fl">電話</label><input class="fi" id="refPhone" type="tel"></div>
        <div class="fg"><label class="fl">Email</label><input class="fi" id="refEmail" type="email"></div>
      </div>
      <div class="fg"><label class="fl">備註（全域）</label><textarea class="fta" id="refGNote" placeholder="此人的一般備注…" style="min-height:52px"></textarea></div>
      <hr class="fdivider">
      <div class="fsection-label">── 此案件專屬</div>
      <div class="fg"><label class="fl">案件備注</label><input class="fi" id="refCaseNote" placeholder="此人在此案件的特別說明…"></div>
      <label class="fck"><input type="checkbox" id="refPrimary"> 設為此案件的主要聯絡人</label>
    </div>
    <div class="mf"><button class="btn" onclick="closeMo('refModal')">取消</button><button class="btn btn-p" onclick="saveRef()">儲存</button></div>
  </div>
</div>

<!-- Milestone Modal -->
<div class="mo" id="msModal">
  <div class="md">
    <div class="mh"><span class="mt" id="msMT">新增期程</span><button class="mcl" onclick="closeMo('msModal')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="mb">
      <input type="hidden" id="msId"><input type="hidden" id="msCaseId">
      <div class="frow">
        <div class="fg"><label class="fl">名稱 <span class="fr">*</span></label><input class="fi" id="msLabel" placeholder="送件期限、審查會議…"></div>
        <div class="fg"><label class="fl">日期 <span class="fr">*</span></label><input class="fi" id="msDate" type="date"></div>
      </div>
    </div>
    <div class="mf"><button class="btn" onclick="closeMo('msModal')">取消</button><button class="btn btn-p" onclick="saveMilestone()">儲存</button></div>
  </div>
</div>

<!-- Log Modal -->
<div class="mo" id="logModal">
  <div class="md">
    <div class="mh"><span class="mt" id="logMT">新增聯絡記錄</span><button class="mcl" onclick="closeMo('logModal')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="mb">
      <input type="hidden" id="logId"><input type="hidden" id="logCaseId"><input type="hidden" id="logRefId">
      <div class="fg"><label class="fl">日期 <span class="fr">*</span></label><input class="fi" id="logDate" type="date"></div>
      <div class="fg"><label class="fl">記錄內容 <span class="fr">*</span></label><textarea class="fta" id="logContent" placeholder="電話確認、信件往來、會議內容…" style="min-height:100px"></textarea></div>
    </div>
    <div class="mf"><button class="btn" onclick="closeMo('logModal')">取消</button><button class="btn btn-p" onclick="saveLog()">儲存</button></div>
  </div>
</div>

<!-- Settings Modal -->
<div class="mo" id="settingsModal">
  <div class="md" style="max-width:480px">
    <div class="mh"><span class="mt">類別管理</span><button class="mcl" onclick="closeMo('settingsModal')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="mb" style="max-height:60vh;overflow-y:auto">
      <div style="font-size:12px;color:var(--txm);margin-bottom:12px">可拖曳調整順序。類別隨 JSON 備份儲存。</div>
      <div id="catList"></div>
      <div class="scat-add">
        <input class="fi" id="newCatInput" placeholder="輸入新類別名稱" style="flex:1" onkeydown="if(event.key==='Enter')addCategory()">
        <button class="btn btn-p" onclick="addCategory()">新增</button>
      </div>
    </div>
    <div class="mf"><button class="btn btn-p" onclick="closeMo('settingsModal')">完成</button></div>
  </div>
</div>

<input type="file" id="importInput" accept=".json" style="display:none" onchange="importJSON(event)">
<div id="toast"></div>

<script>
/* ── Constants ── */
const SK='ccv6';
const DEF_CATS=['環評','環差','監測','許可申請','土污','廢棄物','溫室氣體','其他'];
const BASE_COL={'環評':[99,140,255],'環差':[167,110,210],'監測':[34,197,155],'許可申請':[250,168,36],'土污':[240,80,80],'廢棄物':[128,140,164],'溫室氣體':[52,207,142],'其他':[128,140,164]};
const STATUS_CLS={進行中:'s-active',待辦:'s-pending',暫停:'s-paused',結案:'s-closed'};
function catCol(cat){if(!cat)return['var(--acd)','var(--ac)'];if(BASE_COL[cat]){const[r,g,b]=BASE_COL[cat];return[`rgba(${r},${g},${b},.14)`,`rgb(${r},${g},${b})`];}let h=0;for(let i=0;i<cat.length;i++)h=(h*37+cat.charCodeAt(i))%360;return[`hsla(${h},55%,62%,.14)`,`hsl(${h},55%,62%)`];}

/* ── State ── */
let db={categories:[...DEF_CATS],contacts:[],cases:[]};
let view='cases',selId=null,selDirId=null;
let sortKey='newest',filterCat='',filterStatus='',searchCaseQ='',searchCtQ='';
let themeMode=localStorage.getItem('themeMode')||'auto';
let acHideTimer=null;

/* ── Storage ── */
function loadData(){
  try{
    const r=localStorage.getItem(SK);if(r)db=JSON.parse(r);
    if(!db.categories)db.categories=[...DEF_CATS];
    if(!db.contacts)db.contacts=[];
    db.cases.forEach(c=>{
      if(!c.status)c.status='進行中';
      if(!c.milestones)c.milestones=[];
      if(c.memo==null)c.memo='';
      if(!c.createdAt)c.createdAt=Date.now();
      // Migrate old contacts[] → contactRefs[]
      if(c.contacts&&!c.contactRefs){
        c.contactRefs=c.contacts.map(ct=>{
          let gct=db.contacts.find(g=>g.name===ct.name&&(g.phone===ct.phone||(!g.phone&&!ct.phone)));
          if(!gct){gct={id:ct.id||uid(),name:ct.name||'',role:ct.role||'',contactType:ct.contactType||'',description:ct.description||'',phone:ct.phone||'',email:ct.email||'',note:ct.note||'',createdAt:Date.now()};db.contacts.push(gct);}
          return{id:uid(),contactId:gct.id,primary:!!ct.primary,caseNote:'',logs:ct.logs||[]};
        });
        delete c.contacts;
      }
      if(!c.contactRefs)c.contactRefs=[];
    });
  }catch{db={categories:[...DEF_CATS],contacts:[],cases:[]};}
}
function cleanDb(){
  return{categories:db.categories,contacts:db.contacts,cases:db.cases.map(c=>{
    const{_x,...r}=c;
    return{...r,contactRefs:(r.contactRefs||[]).map(ref=>{const{_logsOpen,...rr}=ref;return rr;})};
  })};
}
function saveData(){localStorage.setItem(SK,JSON.stringify(cleanDb()));updateStorage();}
function updateStorage(){
  const bytes=new TextEncoder().encode(localStorage.getItem(SK)||'').length;
  const kb=(bytes/1024).toFixed(1);const pct=Math.min(100,(bytes/(5*1024*1024))*100);
  document.getElementById('storageText').textContent=`${kb} KB / 5 MB`;
  const f=document.getElementById('storageFill');f.style.width=pct.toFixed(1)+'%';
  f.style.background=pct>80?'var(--err)':pct>50?'var(--warn)':'var(--ac)';
  if(pct>70)showToast(`⚠ LocalStorage 已使用 ${pct.toFixed(0)}%，建議匯出備份`,'warn');
}

/* ── Theme ── */
function getSunTimes(){const s=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Taipei'});const[yr,mo,dy]=s.split('-').map(Number);const day=Math.round((new Date(yr,mo-1,dy)-new Date(yr,0,0))/86400000);const lat=24.1477*Math.PI/180;const decl=-23.45*Math.cos(2*Math.PI/365*(day+10))*Math.PI/180;const cosH=-Math.tan(lat)*Math.tan(decl);const H=Math.acos(Math.max(-1,Math.min(1,cosH)))*180/Math.PI;const noon=12-(120.6736-120)/15;return{rH:noon-H/15,sH:noon+H/15};}
function hhmm(h){const hh=Math.floor(h),mm=Math.round((h-hh)*60)%60;return`${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;}
function applyTheme(){let dark=false;const pill=document.getElementById('sunrisePill');if(themeMode==='dark'){dark=true;pill.style.display='none';}else if(themeMode==='light'){dark=false;pill.style.display='none';}else{const{rH,sH}=getSunTimes();const tw=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Taipei'}));const cur=tw.getHours()+tw.getMinutes()/60;dark=cur<rH||cur>=sH;document.getElementById('sunriseText').textContent=`台中 日出 ${hhmm(rH)} · 日落 ${hhmm(sH)}`;pill.style.display='flex';}document.documentElement.setAttribute('data-theme',dark?'dark':'light');}
function setThemeMode(mode){themeMode=mode;localStorage.setItem('themeMode',mode);applyTheme();document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));document.getElementById({auto:'btnAuto',light:'btnLight',dark:'btnDark'}[mode]).classList.add('active');}

/* ── Utils ── */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function hl(t,q){if(!q)return esc(t);const e=esc(t),eq=esc(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return e.replace(new RegExp(eq,'gi'),m=>`<mark>${m}</mark>`);}
function ini(n){const c=[...(n||'').trim()];return c.length>=2?c[0]+c[c.length-1]:c[0]||'?';}
const today=()=>new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Taipei'});
function urgency(d){const t=new Date();t.setHours(0,0,0,0);const x=new Date(d);x.setHours(0,0,0,0);const diff=(x-t)/86400000;return diff<0?'overdue':diff<=7?'urgent':diff<=30?'soon':'normal';}
function nearestMs(c){const t=new Date();t.setHours(0,0,0,0);const f=(c.milestones||[]).map(m=>new Date(m.date)).filter(d=>{const x=new Date(d);x.setHours(0,0,0,0);return x>=t;});return f.length?Math.min(...f.map(d=>d.getTime())):Infinity;}
function getGContact(ref){return db.contacts.find(c=>c.id===ref.contactId)||{name:'(已刪除)',phone:'',email:'',role:'',contactType:'',description:'',note:''};}

/* ── View Navigation ── */
function setView(v){
  view=v;selId=null;selDirId=null;
  ['cases','directory','timeline'].forEach(x=>document.getElementById('tab'+x.charAt(0).toUpperCase()+x.slice(1))?.classList.remove('active'));
  document.getElementById({cases:'tabCases',directory:'tabDir',timeline:'tabTimeline'}[v]).classList.add('active');
  const rp=document.getElementById('rp');rp.classList.remove('mobile-show');
  renderToolbar();renderLP();renderRP();
}

/* ── Toolbar ── */
function renderToolbar(){
  const tb=document.getElementById('toolbar');
  if(view==='cases'){
    tb.innerHTML=`
      <div class="sw swa"><span class="si"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span><input class="sinput" id="searchCase" placeholder="搜尋案件… (Enter)" type="search" autocomplete="off"></div>
      <div class="sw swb"><span class="si"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><input class="sinput" id="searchContact" placeholder="搜尋聯絡人… (Enter)" type="search" autocomplete="off"></div>
      <div class="tsep"></div>
      <button class="btn btn-sm" onclick="exportJSON()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>JSON</button>
      <button class="btn btn-sm" onclick="document.getElementById('importInput').click()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>匯入</button>
      <button class="btn btn-sm" onclick="exportCSV()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>CSV</button>

function renderCatChips(){
  const el=document.getElementById('catChips');if(!el)return;
  el.innerHTML=`<button class="chip ${filterCat===''?'active':''}" onclick="doFC(this,'')">全部</button>`+db.categories.map(c=>`<button class="chip ${filterCat===c?'active':''}" onclick="doFC(this,'${esc(c)}')">${esc(c)}</button>`).join('');
}
function renderStatusChips(){
  const el=document.getElementById('statusChips');if(!el)return;
  const statuses=['全部','進行中','待辦','暫停','結案'];
  el.innerHTML=statuses.map(s=>{
    const isActive=s==='全部'?filterStatus==='':filterStatus===s;
    return`<button class="chip ${isActive?'active':''}" onclick="doFS(this,'${s==='全部'?'':s}')">${s}</button>`;
  }).join('');
}
function doFC(el,cat){filterCat=cat;document.querySelectorAll('#catChips .chip').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderCasesList();}
function doFS(el,st){filterStatus=st;document.querySelectorAll('#statusChips .chip').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderCasesList();}
function buildSel(el,cur){el.innerHTML='<option value="">— 請選擇 —</option>'+db.categories.map(c=>`<option value="${esc(c)}" ${c===cur?'selected':''}>${esc(c)}</option>`).join('');}
function setSort(el,key){sortKey=key;document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderCasesList();}

function visCases(){
  let cs=db.cases;
  if(filterCat)cs=cs.filter(c=>c.category===filterCat);
  if(filterStatus)cs=cs.filter(c=>c.status===filterStatus);
  if(searchCaseQ)cs=cs.filter(c=>c.name.toLowerCase().includes(searchCaseQ.toLowerCase()));
  if(searchCtQ){const q=searchCtQ.toLowerCase();cs=cs.filter(c=>(c.contactRefs||[]).some(ref=>getGContact(ref).name.toLowerCase().includes(q)));}
  return sortArr(cs);
}
function sortArr(a){
  const arr=[...a];
  if(sortKey==='newest')return arr.sort((x,y)=>(y.createdAt||0)-(x.createdAt||0));
  if(sortKey==='oldest')return arr.sort((x,y)=>(x.createdAt||0)-(y.createdAt||0));
  if(sortKey==='name')return arr.sort((x,y)=>x.name.localeCompare(y.name,'zh-TW'));
  if(sortKey==='cat')return arr.sort((x,y)=>(x.category||'').localeCompare(y.category||'','zh-TW'));
  if(sortKey==='ms')return arr.sort((x,y)=>nearestMs(x)-nearestMs(y));
  return arr;
}

function renderCasesList(){
  const cs=visCases();const el=document.getElementById('lpList');
  if(!cs.length){el.innerHTML=`<div class="lp-empty">${!db.cases.length?'尚無案件，點右上角「新增案件」':'無符合條件的案件'}</div>`;return;}
  el.innerHTML=cs.map(c=>{
    const primary=(c.contactRefs||[]).find(ref=>ref.primary);
    const primaryCt=primary?getGContact(primary):null;
    const col=catCol(c.category);const isSel=c.id===selId;
    const bCol=isSel?(c.category?col[1]:'var(--ac)'):'transparent';
    const sCls=STATUS_CLS[c.status]||'s-active';
    const dots=(c.milestones||[]).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5).map(m=>{
      const urg=urgency(m.date);const dc=urg==='overdue'?'var(--err)':urg!=='normal'?'var(--warn)':'var(--txf)';

      return`<span class="ms-dot${ac}" style="background:${dc}" title="${esc(m.label)} · ${m.date}"></span>`;
    }).join('');
    return`<div class="ci ${isSel?'sel':''}" style="border-left-color:${bCol}" id="ci-${c.id}"
      draggable="true"
      ondragstart="onCaseDragStart(event,'${c.id}')"

      ondrop="onCaseDrop(event,'${c.id}')"
      ondragleave="onCaseDragLeave(event)"

/* ══ TIMELINE VIEW ══ */
function renderTimeline(){
  const rp=document.getElementById('rp');
  const allLogs=[];
  db.cases.forEach(c=>{
    (c.contactRefs||[]).forEach(ref=>{
      const ct=getGContact(ref);
      (ref.logs||[]).forEach(log=>{allLogs.push({date:log.date,content:log.content,contactName:ct.name,caseId:c.id,caseName:c.name,caseCategory:c.category,contactId:ref.contactId});});
    });
  });
  allLogs.sort((a,b)=>b.date.localeCompare(a.date));
  if(!allLogs.length){rp.innerHTML=`<div class="rp-empty"><div class="rp-empty-icon">📅</div><p class="rp-empty-txt">尚無聯絡記錄</p></div>`;return;}
  const grouped={};
  allLogs.forEach(l=>{const m=l.date.substring(0,7);if(!grouped[m])grouped[m]=[];grouped[m].push(l);});
  const html=Object.entries(grouped).map(([month,logs])=>{
    const[y,m]=month.split('-');
    return`<div class="timeline-month"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${y} 年 ${parseInt(m)} 月</div>
    ${logs.map(l=>`<div class="tl-item">
      <div class="tl-dot"></div>
      <div class="tl-date">${l.date}</div>
      <div class="tl-body">
        <div class="tl-header">
          <span class="tl-contact" onclick="setView('directory');selDir('${l.contactId}');renderLP();renderRP()">${esc(l.contactName)}</span>
          <span class="tl-sep">·</span>
          <span class="tl-case" onclick="setView('cases');selCase('${l.caseId}')">${esc(l.caseName)}</span>
          ${l.caseCategory?`<span class="cat-badge" style="background:${catCol(l.caseCategory)[0]};color:${catCol(l.caseCategory)[1]};font-size:10px;padding:1px 6px">${esc(l.caseCategory)}</span>`:''}
        </div>
        <div class="tl-content">${esc(l.content)}</div>
      </div>
    </div>`).join('')}`;
  }).join('');
  rp.innerHTML=`<div class="timeline-wrap">${html}</div>`;
}

/* ══ Drag & Drop : Cases ══ */
let dragCase=null;
function onCaseDragStart(e,id){dragCase=id;setTimeout(()=>document.getElementById('ci-'+id)?.classList.add('dragging'),0);e.dataTransfer.effectAllowed='move';}
function onCaseDragOver(e,id){e.preventDefault();if(dragCase===id)return;const el=document.getElementById('ci-'+id);if(!el)return;const r=el.getBoundingClientRect();const mid=r.top+r.height/2;el.classList.remove('drag-over-top','drag-over-bot');el.classList.add(e.clientY<mid?'drag-over-top':'drag-over-bot');}
function onCaseDragLeave(e){e.currentTarget.classList.remove('drag-over-top','drag-over-bot');}
function onCaseDrop(e,targetId){e.preventDefault();if(!dragCase||dragCase===targetId)return;const el=document.getElementById('ci-'+targetId);const isTop=el?.classList.contains('drag-over-top');const fromIdx=db.cases.findIndex(c=>c.id===dragCase);const toIdx=db.cases.findIndex(c=>c.id===targetId);if(fromIdx<0||toIdx<0)return;const[item]=db.cases.splice(fromIdx,1);const insertAt=isTop?(fromIdx<toIdx?toIdx-1:toIdx):(fromIdx>toIdx?toIdx+1:toIdx);db.cases.splice(insertAt,0,item);saveData();renderCasesList();}
function onCaseDragEnd(){document.querySelectorAll('.ci').forEach(el=>el.classList.remove('dragging','drag-over-top','drag-over-bot'));dragCase=null;}

function onRefDragStart(e,cid,rid){dragRef={caseId:cid,refId:rid};setTimeout(()=>document.getElementById('ct-'+rid)?.classList.add('dragging'),0);e.dataTransfer.effectAllowed='move';}
function onRefDragOver(e,cid,rid){e.preventDefault();if(dragRef.refId===rid)return;const el=document.getElementById('ct-'+rid);if(!el)return;const r=el.getBoundingClientRect();el.classList.remove('drag-over-top','drag-over-bot');el.classList.add(e.clientY<r.top+r.height/2?'drag-over-top':'drag-over-bot');}
function onRefDragLeave(e){e.currentTarget.classList.remove('drag-over-top','drag-over-bot');}
function onRefDrop(e,tCaseId,targetRefId){e.preventDefault();if(!dragRef.refId||dragRef.refId===targetRefId)return;const c=db.cases.find(c=>c.id===tCaseId);if(!c)return;const el=document.getElementById('ct-'+targetRefId);const isTop=el?.classList.contains('drag-over-top');const refs=c.contactRefs;const fromIdx=refs.findIndex(r=>r.id===dragRef.refId);const toIdx=refs.findIndex(r=>r.id===targetRefId);if(fromIdx<0||toIdx<0)return;const[item]=refs.splice(fromIdx,1);refs.splice(isTop?(fromIdx<toIdx?toIdx-1:toIdx):(fromIdx>toIdx?toIdx+1:toIdx),0,item);saveData();renderCasesRP();}
function onRefDragEnd(){document.querySelectorAll('.ct-card').forEach(el=>el.classList.remove('dragging','drag-over-top','drag-over-bot'));dragRef={caseId:null,refId:null};}

/* ══ CRUD : Case ══ */
function openCaseModal(id){
  document.getElementById('caseMT').textContent=id?'編輯案件':'新增案件';
  document.getElementById('caseId').value=id||'';
  const c=id?db.cases.find(c=>c.id===id):null;
  document.getElementById('caseName').value=c?c.name:'';
  document.getElementById('caseStatus').value=c?(c.status||'進行中'):'進行中';
  document.getElementById('caseNote').value=c?(c.note||''):'';
  buildSel(document.getElementById('caseCat'),c?c.category:'');
  openMo('caseModal');setTimeout(()=>document.getElementById('caseName').focus(),80);
}
function saveCase(){
  const name=document.getElementById('caseName').value.trim();
  if(!name){showToast('⚠ 請輸入案件名稱','warn');return;}
  const id=document.getElementById('caseId').value;
  const category=document.getElementById('caseCat').value;
  const status=document.getElementById('caseStatus').value;
  const note=document.getElementById('caseNote').value.trim();
  if(id){const c=db.cases.find(c=>c.id===id);if(c){c.name=name;c.category=category;c.status=status;c.note=note;}}
  else{const nc={id:uid(),name,category,status,note,memo:'',milestones:[],contactRefs:[],createdAt:Date.now()};db.cases.unshift(nc);selId=nc.id;}
  saveData();renderCatChips();renderCasesList();if(selId)renderCasesRP();closeMo('caseModal');showToast(id?'✓ 案件已更新':'✓ 案件已新增');
}
function deleteCase(id){
  const c=db.cases.find(c=>c.id===id);if(!c||!confirm(`確定刪除案件「${c.name}」？`))return;
  db.cases=db.cases.filter(c=>c.id!==id);if(selId===id)selId=null;
  saveData();renderCasesList();renderCasesRP();showToast('案件已刪除','warn');
}

function openGContactModal(id){
  document.getElementById('gContactMT').textContent=id?'編輯聯絡人':'新增聯絡人';
  document.getElementById('gCtId').value=id||'';
  const ct=id?db.contacts.find(c=>c.id===id):null;
  document.getElementById('gCtName').value=ct?ct.name:'';
  document.getElementById('gCtRole').value=ct?(ct.role||''):'';
  document.getElementById('gCtType').value=ct?(ct.contactType||''):'';
  document.getElementById('gCtDesc').value=ct?(ct.description||''):'';
  document.getElementById('gCtPhone').value=ct?(ct.phone||''):'';
  document.getElementById('gCtEmail').value=ct?(ct.email||''):'';
  document.getElementById('gCtNote').value=ct?(ct.note||''):'';
  openMo('gContactModal');setTimeout(()=>document.getElementById('gCtName').focus(),80);
}
function saveGContact(){
  const name=document.getElementById('gCtName').value.trim();
  if(!name){showToast('⚠ 請輸入姓名','warn');return;}
  const id=document.getElementById('gCtId').value;
  const p={name,role:document.getElementById('gCtRole').value.trim(),contactType:document.getElementById('gCtType').value.trim(),description:document.getElementById('gCtDesc').value.trim(),phone:document.getElementById('gCtPhone').value.trim(),email:document.getElementById('gCtEmail').value.trim(),note:document.getElementById('gCtNote').value.trim()};
  if(id){const ct=db.contacts.find(c=>c.id===id);if(ct)Object.assign(ct,p);}
  else{db.contacts.push({id:uid(),createdAt:Date.now(),...p});selDirId=db.contacts[db.contacts.length-1].id;}
  saveData();renderLP();renderRP();closeMo('gContactModal');showToast(id?'✓ 聯絡人已更新':'✓ 聯絡人已新增至名冊');
}
function deleteGContact(id){
  const ct=db.contacts.find(c=>c.id===id);if(!ct)return;
  const usedIn=db.cases.filter(c=>(c.contactRefs||[]).some(r=>r.contactId===id)).map(c=>c.name);
  const msg=usedIn.length?`「${ct.name}」目前在 ${usedIn.length} 個案件中使用：\n${usedIn.join('、')}\n\n刪除後這些案件中的引用將標示為「已刪除」。確定繼續？`:`確定刪除聯絡人「${ct.name}」？`;
  if(!confirm(msg))return;
  db.contacts=db.contacts.filter(c=>c.id!==id);
  if(selDirId===id)selDirId=null;
  saveData();renderLP();renderRP();showToast('聯絡人已刪除','warn');
}

/* ══ CRUD : Ref (Case Contact Reference) ══ */
function openRefModal(caseId,refId){
  document.getElementById('refMT').textContent=refId?'編輯聯絡人':'新增聯絡人至案件';
  document.getElementById('refCaseId').value=caseId;
  document.getElementById('refId').value=refId||'';
  document.getElementById('refPickedGId').value='';
  document.getElementById('refLinked').style.display='none';
  const c=db.cases.find(c=>c.id===caseId);
  const ref=refId&&c?c.contactRefs.find(r=>r.id===refId):null;
  const ct=ref?getGContact(ref):null;
  document.getElementById('refName').value=ct?ct.name:'';
  document.getElementById('refRole').value=ct?(ct.role||''):'';
  document.getElementById('refType').value=ct?(ct.contactType||''):'';
  document.getElementById('refDesc').value=ct?(ct.description||''):'';
  document.getElementById('refPhone').value=ct?(ct.phone||''):'';
  document.getElementById('refEmail').value=ct?(ct.email||''):'';
  document.getElementById('refGNote').value=ct?(ct.note||''):'';
  document.getElementById('refCaseNote').value=ref?(ref.caseNote||''):'';
  document.getElementById('refPrimary').checked=ref?!!ref.primary:false;
  if(ref){document.getElementById('refPickedGId').value=ref.contactId;document.getElementById('refLinked').style.display='flex';}
  openMo('refModal');setTimeout(()=>document.getElementById('refName').focus(),80);
}
function saveRef(){
  const name=document.getElementById('refName').value.trim();
  if(!name){showToast('⚠ 請輸入姓名','warn');return;}
  const caseId=document.getElementById('refCaseId').value;
  const refId=document.getElementById('refId').value;
  const pickedGId=document.getElementById('refPickedGId').value;
  const c=db.cases.find(c=>c.id===caseId);if(!c)return;
  const isPrimary=document.getElementById('refPrimary').checked;
  if(isPrimary)c.contactRefs.forEach(r=>r.primary=false);

    .catch(()=>showToast('複製失敗','warn'));

// 事件委派：處理所有 data-copy 按鈕
document.addEventListener('click',e=>{
  const btn=e.target.closest('[data-copy]');
  if(!btn)return;
  e.stopPropagation();
  const text=btn.getAttribute('data-copy');
  const label=btn.getAttribute('data-label')||'';
  if(!text)return;
  navigator.clipboard.writeText(text)
    .then(()=>showToast(`✓ ${label} 已複製`))
    .catch(()=>{
      // fallback for older browsers
      const ta=document.createElement('textarea');
      ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
      document.body.appendChild(ta);ta.select();
      try{document.execCommand('copy');showToast(`✓ ${label} 已複製`);}
      catch{showToast('複製失敗，請手動選取','warn');}
      document.body.removeChild(ta);
    });
});

/* ══ Fetch JSON from GitHub ══ */
async function tryFetchJSON(){
  setDsPill('loading','讀取中…');
  try{
    const res=await fetch('./contact_control.json',{cache:'no-cache'});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    let raw;
    try{raw=await res.json();}catch{throw new Error('JSON 格式錯誤');}
    // Validate required fields
    if(!raw||typeof raw!=='object')throw new Error('資料格式異常');
    if(!Array.isArray(raw.cases))throw new Error('缺少 cases 欄位');
    if(!Array.isArray(raw.contacts))raw.contacts=[];
    if(!Array.isArray(raw.categories))raw.categories=[...DEF_CATS];
    // Migrate old contacts[] → contactRefs[] + global contacts directory
    raw.cases.forEach(c=>{
      if(!c.id)c.id=uid();
      if(!c.status)c.status='進行中';
      if(!c.milestones)c.milestones=[];
      if(c.memo==null)c.memo='';
      if(!c.createdAt)c.createdAt=Date.now();
      // 舊格式遷移
      if(c.contacts&&!c.contactRefs){
        c.contactRefs=c.contacts.map(ct=>{
          // 先找全域名冊是否已有同名+同電話
          let gct=raw.contacts.find(g=>
            g.name===ct.name&&(g.phone===ct.phone||(!g.phone&&!ct.phone))
          );
          if(!gct){
            gct={
              id:ct.id||uid(),
              name:ct.name||'',
              role:ct.role||'',
              contactType:ct.contactType||'',
              description:ct.description||'',
              phone:ct.phone||'',
              email:ct.email||'',
              note:ct.note||'',
              createdAt:Date.now()
            };
            raw.contacts.push(gct);
          }
          return{
            id:uid(),
            contactId:gct.id,
            primary:!!ct.primary,
            caseNote:'',
            logs:ct.logs||[]
          };
        });
        delete c.contacts;
      }
      if(!c.contactRefs)c.contactRefs=[];
      c.contactRefs.forEach(ref=>{if(!ref.logs)ref.logs=[];});
    });
    raw.contacts.forEach(ct=>{if(!ct.id)ct.id=uid();});
    db=raw;
    // Also save to localStorage as cache
    localStorage.setItem(SK,JSON.stringify(cleanDb()));
    updateStorage();
    const ts=new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
    setDsPill('github',`GitHub · ${ts}`);
    return true;
  }catch(err){
    console.warn('fetch JSON failed:',err.message);
    return false;
  }
}
