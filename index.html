<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>contact control</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="m-orb-mid" aria-hidden="true"></div>
<header>
  <div class="logo">
    <div class="lic"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>
    contact control
  </div>
  <div class="hsp"></div>
  <div class="pill" id="sunrisePill" style="display:none">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/></svg>
    <span id="sunriseText"></span>
  </div>
  <div class="pill">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
    <span id="storageText">—</span>
    <div class="sbar"><div class="sfill" id="storageFill"></div></div>
  </div>
  <div class="tg">
    <button class="tb" id="btnAuto"  onclick="setThemeMode('auto')">自動</button>
    <button class="tb" id="btnLight" onclick="setThemeMode('light')">淺色</button>
    <button class="tb" id="btnDark"  onclick="setThemeMode('dark')">深色</button>
  </div>
  <button class="hbtn" onclick="openSettings()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 0-14.14 0M4.93 19.07a10 10 0 0 0 14.14 0M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
    類別管理
  </button>
</header>

<div class="toolbar">
  <div class="sw swa">
    <span class="si"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
    <input class="sinput" id="searchCase" placeholder="搜尋案件… (Enter)" type="search" autocomplete="off">
  </div>
  <div class="sw swb">
    <span class="si"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
    <input class="sinput" id="searchContact" placeholder="搜尋聯絡人… (Enter)" type="search" autocomplete="off">
  </div>
  <div class="tsep"></div>
  <button class="btn btn-sm" onclick="exportJSON()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>JSON</button>
  <button class="btn btn-sm" onclick="triggerImport()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>匯入</button>
  <button class="btn btn-sm" onclick="exportCSV()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>CSV</button>
  <button class="btn btn-sm" onclick="printView()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>列印</button>
  <div class="tbsp"></div>
  <button class="btn btn-p" onclick="openCaseModal()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>新增案件</button>
  <input type="file" id="importInput" accept=".json" style="display:none" onchange="importJSON(event)">
</div>

<div class="layout">
  <div class="lp">
    <div class="lp-top">
      <div class="fl-label">類別篩選</div>
      <div class="cat-chips" id="catChips"></div>
      <div class="sort-row">
        <span class="slabel">排序</span>
        <button class="sbtn active" onclick="setSort(this,'newest')">最新</button>
        <button class="sbtn" onclick="setSort(this,'oldest')">時間</button>
        <button class="sbtn" onclick="setSort(this,'name')">A-Z</button>
        <button class="sbtn" onclick="setSort(this,'cat')">類別</button>
        <button class="sbtn" onclick="setSort(this,'ms')">期程</button>
      </div>
    </div>
    <div class="lp-list" id="lpList"></div>
    <div class="lp-bottom">
      <button class="btn btn-gh" style="width:100%;justify-content:center;font-size:13px" onclick="openCaseModal()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>新增案件
      </button>
    </div>
  </div>
  <div class="rp" id="rp">
    <div class="rp-empty"><div class="rp-empty-icon">📋</div><p class="rp-empty-txt">點選左側案件查看詳情</p></div>
  </div>
</div>

<!-- Case Modal -->
<div class="mo" id="caseModal">
  <div class="md">
    <div class="mh"><span class="mt" id="caseMT">新增案件</span><button class="mcl" onclick="closeMo('caseModal')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="mb">
      <input type="hidden" id="caseId">
      <div class="fg"><label class="fl">案件名稱 <span class="fr">*</span></label><input class="fi" id="caseName" placeholder="例：○○廠 環境影響評估"></div>
      <div class="frow">
        <div class="fg"><label class="fl">案件類別</label><select class="fs" id="caseCat"></select></div>
        <div class="fg"><label class="fl">備註</label><input class="fi" id="caseNote" placeholder="選填"></div>
      </div>
    </div>
    <div class="mf"><button class="btn" onclick="closeMo('caseModal')">取消</button><button class="btn btn-p" onclick="saveCase()">儲存</button></div>
  </div>
</div>

<!-- Contact Modal -->
<div class="mo" id="contactModal">
  <div class="md">
    <div class="mh"><span class="mt" id="contactMT">新增聯絡人</span><button class="mcl" onclick="closeMo('contactModal')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="mb">
      <input type="hidden" id="ctId"><input type="hidden" id="ctCaseId">
      <div class="frow">
        <div class="fg"><label class="fl">姓名 <span class="fr">*</span></label><input class="fi" id="ctName" placeholder="王小明"></div>
        <div class="fg"><label class="fl">身份 / 職位</label><input class="fi" id="ctRole" placeholder="總務、經理、主任…"></div>
      </div>
      <div class="fg"><label class="fl">角色類別</label><input class="fi" id="ctType" placeholder="例：業主、下包（空品監測）、規劃團隊…"></div>
      <div class="fg"><label class="fl">說明</label><textarea class="fta" id="ctDesc" placeholder="負責窗口的對接說明、負責範疇或其他事項…"></textarea></div>
      <div class="frow">
        <div class="fg"><label class="fl">電話</label><input class="fi" id="ctPhone" type="tel" placeholder="0900-000-000"></div>
        <div class="fg"><label class="fl">Email</label><input class="fi" id="ctEmail" type="email" placeholder="example@mail.com"></div>
      </div>
      <div class="fg"><label class="fl">備註</label><textarea class="fta" id="ctNote" placeholder="其他補充…" style="min-height:56px"></textarea></div>
      <label class="fck"><input type="checkbox" id="ctPrimary"> 設為此案件的主要聯絡人</label>
    </div>
    <div class="mf"><button class="btn" onclick="closeMo('contactModal')">取消</button><button class="btn btn-p" onclick="saveContact()">儲存</button></div>
  </div>
</div>

<!-- Milestone Modal -->
<div class="mo" id="msModal">
  <div class="md">
    <div class="mh"><span class="mt" id="msMT">新增期程</span><button class="mcl" onclick="closeMo('msModal')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="mb">
      <input type="hidden" id="msId"><input type="hidden" id="msCaseId">
      <div class="frow">
        <div class="fg"><label class="fl">期程名稱 <span class="fr">*</span></label><input class="fi" id="msLabel" placeholder="送件期限、審查會議…"></div>
        <div class="fg"><label class="fl">日期 <span class="fr">*</span></label><input class="fi" id="msDate" type="date"></div>
      </div>
    </div>
    <div class="mf"><button class="btn" onclick="closeMo('msModal')">取消</button><button class="btn btn-p" onclick="saveMilestone()">儲存</button></div>
  </div>
</div>

<!-- Log Modal -->
<div class="mo" id="logModal">
  <div class="md">
    <div class="mh"><span class="mt" id="logMT">新增聯絡記錄</span><button class="mcl" onclick="closeMo('logModal')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="mb">
      <input type="hidden" id="logId"><input type="hidden" id="logCaseId"><input type="hidden" id="logCtId">
      <div class="fg"><label class="fl">日期 <span class="fr">*</span></label><input class="fi" id="logDate" type="date"></div>
      <div class="fg"><label class="fl">記錄內容 <span class="fr">*</span></label><textarea class="fta" id="logContent" placeholder="電話確認、信件往來、會議內容…" style="min-height:100px"></textarea></div>
    </div>
    <div class="mf"><button class="btn" onclick="closeMo('logModal')">取消</button><button class="btn btn-p" onclick="saveLog()">儲存</button></div>
  </div>
</div>

<!-- Settings Modal -->
<div class="mo" id="settingsModal">
  <div class="md" style="max-width:480px">
    <div class="mh"><span class="mt">類別管理</span><button class="mcl" onclick="closeMo('settingsModal')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="mb" style="max-height:60vh;overflow-y:auto">
      <div style="font-size:12px;color:var(--txm);margin-bottom:14px;line-height:1.6">類別隨 JSON 備份儲存，上傳 GitHub 後可跨裝置同步。</div>
      <div id="catList"></div>
      <div class="scat-add">
        <input class="fi" id="newCatInput" placeholder="輸入新類別名稱" style="flex:1" onkeydown="if(event.key==='Enter')addCategory()">
        <button class="btn btn-p" onclick="addCategory()">新增</button>
      </div>
    </div>
    <div class="mf"><button class="btn btn-p" onclick="closeMo('settingsModal')">完成</button></div>
  </div>
</div>

<div id="toast"></div>

<script>
const SK='ccv5';
const DEF_CATS=['環評','環差','監測','許可申請','土污','廢棄物','溫室氣體','其他'];
const BASE_COL={'環評':[99,140,255],'環差':[167,110,210],'監測':[34,197,155],'許可申請':[250,168,36],'土污':[240,80,80],'廢棄物':[128,140,164],'溫室氣體':[52,207,142],'其他':[128,140,164]};
function catCol(cat){if(!cat)return['var(--acd)','var(--ac)'];if(BASE_COL[cat]){const[r,g,b]=BASE_COL[cat];return[`rgba(${r},${g},${b},.14)`,`rgb(${r},${g},${b})`];}let h=0;for(let i=0;i<cat.length;i++)h=(h*37+cat.charCodeAt(i))%360;return[`hsla(${h},55%,62%,.14)`,`hsl(${h},55%,62%)`];}
let db={categories:[...DEF_CATS],cases:[]};
let selId=null,sortKey='newest',filterCat='',searchCaseQ='',searchCtQ='';
let themeMode=localStorage.getItem('themeMode')||'auto';
function loadData(){try{const r=localStorage.getItem(SK);if(r)db=JSON.parse(r);if(!db.categories)db.categories=[...DEF_CATS];db.cases.forEach(c=>{if(!c.milestones)c.milestones=[];if(!c.contacts)c.contacts=[];if(c.memo==null)c.memo='';if(!c.createdAt)c.createdAt=Date.now();c.contacts.forEach(ct=>{if(!ct.logs)ct.logs=[];});}); }catch{db={categories:[...DEF_CATS],cases:[]};}}
function cleanDb(){return{categories:db.categories,cases:db.cases.map(c=>{const{_x,...r}=c;return{...r,contacts:(r.contacts||[]).map(ct=>{const{_logsOpen,...rc}=ct;return rc;})};})}}
function saveData(){localStorage.setItem(SK,JSON.stringify(cleanDb()));updateStorage();}
function updateStorage(){const bytes=new TextEncoder().encode(localStorage.getItem(SK)||'').length;const kb=(bytes/1024).toFixed(1);const pct=Math.min(100,(bytes/(5*1024*1024))*100);document.getElementById('storageText').textContent=`${kb} KB / 5 MB`;const f=document.getElementById('storageFill');f.style.width=pct.toFixed(1)+'%';f.style.background=pct>80?'var(--err)':pct>50?'var(--warn)':'var(--ac)';}
function getSunTimes(){const s=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Taipei'});const[yr,mo,dy]=s.split('-').map(Number);const day=Math.round((new Date(yr,mo-1,dy)-new Date(yr,0,0))/86400000);const lat=24.1477*Math.PI/180;const decl=-23.45*Math.cos(2*Math.PI/365*(day+10))*Math.PI/180;const cosH=-Math.tan(lat)*Math.tan(decl);const H=Math.acos(Math.max(-1,Math.min(1,cosH)))*180/Math.PI;const noon=12-(120.6736-120)/15;return{rH:noon-H/15,sH:noon+H/15};}
function hhmm(h){const hh=Math.floor(h),mm=Math.round((h-hh)*60)%60;return`${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;}
function applyTheme(){let dark=false;const pill=document.getElementById('sunrisePill');if(themeMode==='dark'){dark=true;pill.style.display='none';}else if(themeMode==='light'){dark=false;pill.style.display='none';}else{const{rH,sH}=getSunTimes();const tw=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Taipei'}));const cur=tw.getHours()+tw.getMinutes()/60;dark=cur<rH||cur>=sH;document.getElementById('sunriseText').textContent=`台中 日出 ${hhmm(rH)} · 日落 ${hhmm(sH)}`;pill.style.display='flex';}document.documentElement.setAttribute('data-theme',dark?'dark':'light');}
function setThemeMode(mode){themeMode=mode;localStorage.setItem('themeMode',mode);applyTheme();document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));document.getElementById({auto:'btnAuto',light:'btnLight',dark:'btnDark'}[mode]).classList.add('active');}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function hl(t,q){if(!q)return esc(t);const e=esc(t),eq=esc(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return e.replace(new RegExp(eq,'gi'),m=>`<mark>${m}</mark>`);}
function ini(n){const c=[...(n||'').trim()];return c.length>=2?c[0]+c[c.length-1]:c[0]||'?';}
const today=()=>new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Taipei'});
function urgency(d){const t=new Date();t.setHours(0,0,0,0);const x=new Date(d);x.setHours(0,0,0,0);const diff=(x-t)/86400000;return diff<0?'overdue':diff<=7?'urgent':diff<=30?'soon':'normal';}
function nearestMs(c){const t=new Date();t.setHours(0,0,0,0);const f=(c.milestones||[]).map(m=>new Date(m.date)).filter(d=>{const x=new Date(d);x.setHours(0,0,0,0);return x>=t;});return f.length?Math.min(...f.map(d=>d.getTime())):Infinity;}
function visCases(){let cs=db.cases;if(filterCat)cs=cs.filter(c=>c.category===filterCat);if(searchCaseQ)cs=cs.filter(c=>c.name.toLowerCase().includes(searchCaseQ.toLowerCase()));if(searchCtQ){const q=searchCtQ.toLowerCase();cs=cs.filter(c=>(c.contacts||[]).some(ct=>ct.name.toLowerCase().includes(q)));}return sortArr(cs);}
function sortArr(a){const arr=[...a];if(sortKey==='newest')return arr.sort((x,y)=>(y.createdAt||0)-(x.createdAt||0));if(sortKey==='oldest')return arr.sort((x,y)=>(x.createdAt||0)-(y.createdAt||0));if(sortKey==='name')return arr.sort((x,y)=>x.name.localeCompare(y.name,'zh-TW'));if(sortKey==='cat')return arr.sort((x,y)=>(x.category||'').localeCompare(y.category||'','zh-TW'));if(sortKey==='ms')return arr.sort((x,y)=>nearestMs(x)-nearestMs(y));return arr;}
function setSort(el,key){sortKey=key;document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderLeft();}
function renderCatChips(){document.getElementById('catChips').innerHTML=`<button class="chip ${filterCat===''?'active':''}" onclick="doFC(this,'')">全部</button>`+db.categories.map(c=>`<button class="chip ${filterCat===c?'active':''}" onclick="doFC(this,'${esc(c)}')">${esc(c)}</button>`).join('');}
function doFC(el,cat){filterCat=cat;document.querySelectorAll('#catChips .chip').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderLeft();}
function buildSel(el,cur){el.innerHTML='<option value="">— 請選擇 —</option>'+db.categories.map(c=>`<option value="${esc(c)}" ${c===cur?'selected':''}>${esc(c)}</option>`).join('');}
function renderLeft(){const cs=visCases();const el=document.getElementById('lpList');if(!cs.length){el.innerHTML=`<div class="lp-empty">${!db.cases.length?'尚無案件，請點「新增案件」':'無符合條件的案件'}</div>`;return;}el.innerHTML=cs.map(c=>{const primary=(c.contacts||[]).find(ct=>ct.primary);const col=catCol(c.category);const isSel=c.id===selId;const bCol=isSel?(c.category?col[1]:'var(--ac)'):'transparent';const dots=(c.milestones||[]).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5).map(m=>{const urg=urgency(m.date);const dc=urg==='overdue'?'var(--err)':urg!=='normal'?'var(--warn)':'var(--txf)';const ac=urg==='overdue'?' bl-fast':urg==='urgent'?' bl-slow':'';return`<span class="ms-dot${ac}" style="background:${dc}" title="${esc(m.label)} · ${m.date}"></span>`;}).join('');return`<div class="ci ${isSel?'sel':''}" style="border-left-color:${bCol}" id="ci-${c.id}" onclick="selCase('${c.id}')"><div class="ci-body"><div class="ci-name">${hl(c.name,searchCaseQ)}</div><div class="ci-meta">${c.category?`<span class="cat-badge" style="background:${col[0]};color:${col[1]}">${esc(c.category)}</span>`:''}${primary?`<span class="ci-pc"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${esc(primary.name)}</span>`:''}</div><div class="ci-bottom"><div class="ms-dots">${dots}</div><span class="ci-cnt">${(c.contacts||[]).length} 位聯絡人</span></div></div><div class="ci-acts" onclick="event.stopPropagation()"><button class="ibtn" onclick="openCaseModal('${c.id}')" title="編輯"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="ibtn del" onclick="deleteCase('${c.id}')" title="刪除"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button></div></div>`;}).join('');}
function renderRight(){const rp=document.getElementById('rp');const c=db.cases.find(c=>c.id===selId);if(!c){rp.innerHTML=`<div class="rp-empty"><div class="rp-empty-icon">📋</div><p class="rp-empty-txt">點選左側案件查看詳情</p></div>`;return;}const sy=rp.scrollTop;const col=catCol(c.category);const acCol=c.category?col[1]:'var(--ac)';const mss=(c.milestones||[]).sort((a,b)=>a.date.localeCompare(b.date));const msHtml=mss.map(m=>{const urg=urgency(m.date);const an=urg==='overdue'?' bl-fast':urg==='urgent'?' bl-slow':'';return`<button class="ms-card ${urg}${an}" onclick="openMsModal('${c.id}','${m.id}')"><span class="ms-lbl">${esc(m.label)}</span><span class="ms-dt">${m.date}</span><span class="ms-del-btn" onclick="event.stopPropagation();deleteMilestone('${c.id}','${m.id}')">×</span></button>`;}).join('');const ctHtml=(c.contacts||[]).map(ct=>renderCtCard(c.id,ct)).join('');rp.innerHTML=`<div><div class="cd-head"><div class="cd-accent" style="background:${acCol}"></div><div class="cd-top"><div class="cd-title">${c.category?`<div class="cd-badge"><span class="cat-badge" style="background:${col[0]};color:${col[1]}">${esc(c.category)}</span></div>`:''}<div class="cd-name">${esc(c.name)}</div>${c.note?`<div class="cd-note-txt">${esc(c.note)}</div>`:''}</div><div class="cd-hacts"><button class="btn btn-sm" onclick="openCaseModal('${c.id}')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>編輯</button><button class="btn btn-sm" style="color:var(--err);border-color:rgba(248,113,113,.3)" onclick="deleteCase('${c.id}')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>刪除</button></div></div></div><div class="cd-sec"><div class="cd-sec-hd"><span class="sec-title"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>期程</span><button class="btn btn-xs" onclick="openMsModal('${c.id}')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>新增期程</button></div><div class="ms-grid">${msHtml||`<span style="font-size:13px;color:var(--txf)">尚無期程</span>`}</div></div><div class="cd-sec"><div class="cd-sec-hd"><span class="sec-title"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>聯絡人</span><button class="btn btn-xs" onclick="openContactModal('${c.id}')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>新增聯絡人</button></div><div class="ct-list">${ctHtml||`<span style="font-size:13px;color:var(--txf)">尚無聯絡人</span>`}</div></div><div class="memo-sec"><div class="memo-title">備忘欄</div><textarea class="memo-ta" placeholder="公文字號、注意事項、其他備忘…" onblur="saveMemo('${c.id}',this.value)">${esc(c.memo||'')}</textarea></div></div>`;rp.scrollTop=sy;}
function renderCtCard(caseId,ct){const logs=(ct.logs||[]).sort((a,b)=>b.date.localeCompare(a.date));const typeTag=ct.contactType?`<span class="ct-type" style="background:var(--acd);color:var(--ac);border:1px solid var(--acg)">${esc(ct.contactType)}</span>`:'';const logsHtml=logs.map(l=>`<div class="log-item"><div class="log-date">${esc(l.date)}</div><div class="log-content">${esc(l.content)}</div><button class="log-del-btn" onclick="deleteLog('${caseId}','${ct.id}','${l.id}')" title="刪除"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>`).join('');return`<div class="ct-card"><div class="ct-head"><div class="av">${ini(ct.name)}</div><div class="ct-info"><div class="ct-nr"><span class="ct-name">${hl(ct.name,searchCtQ)}</span>${ct.primary?'<span class="bp">主要</span>':''}${typeTag}${ct.role?`<span class="ct-role">${esc(ct.role)}</span>`:''}</div><div class="ct-dets">${ct.phone?`<span class="df"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8 9.91a16 16 0 0 0 6 6l.86-.86a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>${esc(ct.phone)}<button class="cpbtn" onclick="copyText(${JSON.stringify(ct.phone)},'電話')" title="複製電話"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></span>`:''}${ct.email?`<span class="df"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>${esc(ct.email)}<button class="cpbtn" onclick="copyText(${JSON.stringify(ct.email)},'Email')" title="複製 Email"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></span>`:''}</div></div><div class="ct-hacts"><button class="ibtn" onclick="openContactModal('${caseId}','${ct.id}')" title="編輯"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button class="ibtn del" onclick="deleteContact('${caseId}','${ct.id}')" title="刪除"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button></div></div>${ct.description?`<div class="ct-desc"><div class="ct-desc-label">說明</div>${esc(ct.description)}</div>`:''}${ct.note?`<div class="ct-note">${esc(ct.note)}</div>`:''}<div class="log-sec ${ct._logsOpen?'log-open':''}"><button class="log-tog" onclick="toggleLogs('${caseId}','${ct.id}')"><span class="log-tic"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></span>聯絡記錄（${logs.length} 筆）</button><div class="log-body">${logs.length?logsHtml:'<div style="font-size:13px;color:var(--txf);padding:4px 0">尚無記錄</div>'}<div class="log-add"><button class="btn btn-xs btn-gh" onclick="openLogModal('${caseId}','${ct.id}')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>新增記錄</button></div></div></div></div>`;}
function render(){renderLeft();renderRight();}
function selCase(id){selId=id;renderLeft();renderRight();}
function openCaseModal(id){document.getElementById('caseMT').textContent=id?'編輯案件':'新增案件';document.getElementById('caseId').value=id||'';const c=id?db.cases.find(c=>c.id===id):null;document.getElementById('caseName').value=c?c.name:'';document.getElementById('caseNote').value=c?(c.note||''):'';buildSel(document.getElementById('caseCat'),c?c.category:'');openMo('caseModal');setTimeout(()=>document.getElementById('caseName').focus(),80);}
function saveCase(){const name=document.getElementById('caseName').value.trim();if(!name){showToast('⚠ 請輸入案件名稱','warn');return;}const id=document.getElementById('caseId').value;const category=document.getElementById('caseCat').value;const note=document.getElementById('caseNote').value.trim();if(id){const c=db.cases.find(c=>c.id===id);if(c){c.name=name;c.category=category;c.note=note;}}else{const nc={id:uid(),name,category,note,memo:'',milestones:[],contacts:[],createdAt:Date.now()};db.cases.unshift(nc);selId=nc.id;}saveData();renderCatChips();render();closeMo('caseModal');showToast(id?'✓ 案件已更新':'✓ 案件已新增');}
function deleteCase(id){const c=db.cases.find(c=>c.id===id);if(!c||!confirm(`確定刪除案件「${c.name}」及其所有資料？`))return;db.cases=db.cases.filter(c=>c.id!==id);if(selId===id)selId=null;saveData();render();showToast('案件已刪除','warn');}
function openContactModal(caseId,ctId){document.getElementById('contactMT').textContent=ctId?'編輯聯絡人':'新增聯絡人';document.getElementById('ctCaseId').value=caseId;document.getElementById('ctId').value=ctId||'';const c=db.cases.find(c=>c.id===caseId);const ct=ctId&&c?c.contacts.find(ct=>ct.id===ctId):null;document.getElementById('ctName').value=ct?ct.name:'';document.getElementById('ctRole').value=ct?(ct.role||''):'';document.getElementById('ctType').value=ct?(ct.contactType||''):'';document.getElementById('ctDesc').value=ct?(ct.description||''):'';document.getElementById('ctPhone').value=ct?(ct.phone||''):'';document.getElementById('ctEmail').value=ct?(ct.email||''):'';document.getElementById('ctNote').value=ct?(ct.note||''):'';document.getElementById('ctPrimary').checked=ct?!!ct.primary:false;openMo('contactModal');setTimeout(()=>document.getElementById('ctName').focus(),80);}
function saveContact(){const name=document.getElementById('ctName').value.trim();if(!name){showToast('⚠ 請輸入姓名','warn');return;}const caseId=document.getElementById('ctCaseId').value;const ctId=document.getElementById('ctId').value;const c=db.cases.find(c=>c.id===caseId);if(!c)return;const isPrimary=document.getElementById('ctPrimary').checked;if(isPrimary)c.contacts.forEach(ct=>ct.primary=false);const p={name,role:document.getElementById('ctRole').value.trim(),contactType:document.getElementById('ctType').value.trim(),description:document.getElementById('ctDesc').value.trim(),phone:document.getElementById('ctPhone').value.trim(),email:document.getElementById('ctEmail').value.trim(),note:document.getElementById('ctNote').value.trim(),primary:isPrimary};if(ctId){const ct=c.contacts.find(ct=>ct.id===ctId);if(ct)Object.assign(ct,p);}else{c.contacts.push({id:uid(),logs:[],...p});}saveData();renderRight();closeMo('contactModal');showToast(ctId?'✓ 聯絡人已更新':'✓ 聯絡人已新增');}
function deleteContact(caseId,ctId){const c=db.cases.find(c=>c.id===caseId);if(!c)return;const ct=c.contacts.find(ct=>ct.id===ctId);if(!ct||!confirm(`確定刪除聯絡人「${ct.name}」？`))return;c.contacts=c.contacts.filter(ct=>ct.id!==ctId);saveData();render();showToast('聯絡人已刪除','warn');}
function openMsModal(caseId,msId){document.getElementById('msMT').textContent=msId?'編輯期程':'新增期程';document.getElementById('msCaseId').value=caseId;document.getElementById('msId').value=msId||'';const c=db.cases.find(c=>c.id===caseId);const m=msId&&c?c.milestones.find(m=>m.id===msId):null;document.getElementById('msLabel').value=m?m.label:'';document.getElementById('msDate').value=m?m.date:today();openMo('msModal');setTimeout(()=>document.getElementById('msLabel').focus(),80);}
function saveMilestone(){const label=document.getElementById('msLabel').value.trim();const date=document.getElementById('msDate').value;if(!label||!date){showToast('⚠ 請填入名稱與日期','warn');return;}const caseId=document.getElementById('msCaseId').value;const msId=document.getElementById('msId').value;const c=db.cases.find(c=>c.id===caseId);if(!c)return;if(msId){const m=c.milestones.find(m=>m.id===msId);if(m){m.label=label;m.date=date;}}else{c.milestones.push({id:uid(),label,date});}saveData();renderLeft();renderRight();closeMo('msModal');showToast(msId?'✓ 期程已更新':'✓ 期程已新增');}
function deleteMilestone(caseId,msId){const c=db.cases.find(c=>c.id===caseId);if(!c)return;if(!confirm('確定刪除此期程？'))return;c.milestones=c.milestones.filter(m=>m.id!==msId);saveData();renderLeft();renderRight();}
function openLogModal(caseId,ctId,logId){document.getElementById('logMT').textContent=logId?'編輯記錄':'新增聯絡記錄';document.getElementById('logCaseId').value=caseId;document.getElementById('logCtId').value=ctId;document.getElementById('logId').value=logId||'';const c=db.cases.find(c=>c.id===caseId);const ct=c&&c.contacts.find(ct=>ct.id===ctId);const l=logId&&ct?ct.logs.find(l=>l.id===logId):null;document.getElementById('logDate').value=l?l.date:today();document.getElementById('logContent').value=l?l.content:'';openMo('logModal');setTimeout(()=>document.getElementById('logContent').focus(),80);}
function saveLog(){const date=document.getElementById('logDate').value;const content=document.getElementById('logContent').value.trim();if(!date||!content){showToast('⚠ 請填入日期與內容','warn');return;}const caseId=document.getElementById('logCaseId').value;const ctId=document.getElementById('logCtId').value;const logId=document.getElementById('logId').value;const c=db.cases.find(c=>c.id===caseId);if(!c)return;const ct=c.contacts.find(ct=>ct.id===ctId);if(!ct)return;if(logId){const l=ct.logs.find(l=>l.id===logId);if(l){l.date=date;l.content=content;}}else{ct.logs.push({id:uid(),date,content});ct._logsOpen=true;}saveData();renderRight();closeMo('logModal');showToast(logId?'✓ 記錄已更新':'✓ 記錄已新增');}
function deleteLog(caseId,ctId,logId){const c=db.cases.find(c=>c.id===caseId);if(!c)return;const ct=c.contacts.find(ct=>ct.id===ctId);if(!ct)return;if(!confirm('確定刪除此聯絡記錄？'))return;ct.logs=ct.logs.filter(l=>l.id!==logId);saveData();renderRight();}
function toggleLogs(caseId,ctId){const c=db.cases.find(c=>c.id===caseId);if(!c)return;const ct=c.contacts.find(ct=>ct.id===ctId);if(!ct)return;ct._logsOpen=!ct._logsOpen;renderRight();}
function saveMemo(caseId,val){const c=db.cases.find(c=>c.id===caseId);if(!c)return;if(c.memo!==val){c.memo=val;saveData();}}
function openSettings(){renderCatList();openMo('settingsModal');setTimeout(()=>document.getElementById('newCatInput').focus(),80);}
function renderCatList(){document.getElementById('catList').innerHTML=db.categories.map(cat=>{const[,fg]=catCol(cat);return`<div class="scat-item"><div class="scat-nm"><div class="scat-dot" style="background:${fg}"></div>${esc(cat)}</div><button class="ibtn del" onclick="deleteCat('${esc(cat)}')" title="刪除"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>`;}).join('');}
function addCategory(){const val=document.getElementById('newCatInput').value.trim();if(!val)return;if(db.categories.includes(val)){showToast('⚠ 此類別已存在','warn');return;}db.categories.push(val);document.getElementById('newCatInput').value='';saveData();renderCatChips();renderCatList();showToast(`✓ 已新增類別「${val}」`);}
function deleteCat(cat){const used=db.cases.filter(c=>c.category===cat).length;if(!confirm(used?`有 ${used} 個案件使用此類別，確定刪除？`:`確定刪除類別「${cat}」？`))return;if(used)db.cases.forEach(c=>{if(c.category===cat)c.category='';});db.categories=db.categories.filter(c=>c!==cat);saveData();renderCatChips();renderCatList();render();showToast('類別已刪除','warn');}
const openMo=id=>document.getElementById(id).classList.add('open');
const closeMo=id=>document.getElementById(id).classList.remove('open');
document.querySelectorAll('.mo').forEach(el=>el.addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');}));
function setupSearch(){
  const cEl=document.getElementById('searchCase'),ctEl=document.getElementById('searchContact');
  cEl.addEventListener('keydown',e=>{
    if(e.key==='Enter'){
      searchCaseQ=e.target.value.trim();
      const matched=visCases();
      if(matched.length>0) selId=matched[0].id;
      render();
    }
  });
  cEl.addEventListener('input',e=>{ if(!e.target.value){searchCaseQ='';render();} });
  ctEl.addEventListener('keydown',e=>{
    if(e.key==='Enter'){
      searchCtQ=e.target.value.trim();
      if(searchCtQ){
        const q=searchCtQ.toLowerCase();
        const matched=visCases();
        if(matched.length>0){
          selId=matched[0].id;
          const c=db.cases.find(c=>c.id===selId);
          if(c) c.contacts.forEach(ct=>{ if(ct.name.toLowerCase().includes(q)) ct._logsOpen=true; });
        }
      }
      render();
    }
  });
  ctEl.addEventListener('input',e=>{ if(!e.target.value){searchCtQ='';render();} });
}
function copyText(text,label){navigator.clipboard.writeText(text).then(()=>showToast(`✓ ${label} 已複製`)).catch(()=>showToast('複製失敗','warn'));}
let _tt;
function showToast(msg,type){const t=document.getElementById('toast');t.style.display='flex';t.style.animation='none';t.offsetHeight;t.style.animation='tsi .2s ease';t.innerHTML=`<span style="color:${type==='warn'?'var(--warn)':'var(--ok)'}">●</span><span>${esc(msg)}</span>`;clearTimeout(_tt);_tt=setTimeout(()=>t.style.display='none',2800);}
function exportJSON(){dlBlob(new Blob([JSON.stringify(cleanDb(),null,2)],{type:'application/json'}),`contact_control_${today()}.json`);showToast('✓ JSON 匯出完成，可上傳 GitHub 備份');}
function triggerImport(){document.getElementById('importInput').click();}
function importJSON(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const imp=JSON.parse(ev.target.result);if(!Array.isArray(imp.cases))throw 0;if(!confirm(`確定匯入？現有 ${db.cases.length} 筆案件將被覆蓋。`))return;db=imp;if(!db.categories)db.categories=[...DEF_CATS];db.cases.forEach(c=>{if(!c.milestones)c.milestones=[];if(!c.contacts)c.contacts=[];if(c.memo==null)c.memo='';if(!c.createdAt)c.createdAt=Date.now();c.contacts.forEach(ct=>{if(!ct.logs)ct.logs=[];});});selId=null;saveData();renderCatChips();render();showToast(`✓ 已匯入 ${db.cases.length} 筆案件`);}catch{showToast('⚠ 匯入失敗：請確認為有效 JSON 備份','warn');}e.target.value='';};reader.readAsText(file);}
function exportCSV(){const rows=[['案件名稱','類別','案件備註','期程','聯絡人姓名','身份/職位','角色類別','說明','電話','Email','備註','主要聯絡人']];db.cases.forEach(c=>{const msStr=(c.milestones||[]).map(m=>`${m.label}(${m.date})`).join('；');const cts=c.contacts||[];if(!cts.length){rows.push([c.name,c.category||'',c.note||'',msStr,'','','','','','','','']);return;}cts.forEach(ct=>rows.push([c.name,c.category||'',c.note||'',msStr,ct.name,ct.role||'',ct.contactType||'',ct.description||'',ct.phone||'',ct.email||'',ct.note||'',ct.primary?'是':'']));});const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');dlBlob(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}),`contact_control_${today()}.csv`);showToast('✓ CSV 匯出完成');}
function dlBlob(blob,name){const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:name});a.click();}
function printView(){let html=`<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><title>contact control 列印</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,'PingFang TC','Microsoft JhengHei',sans-serif;font-size:12px;color:#1a1a1a;padding:20px 28px}h1{font-size:16px;font-weight:700;border-bottom:2px solid #333;padding-bottom:10px;margin-bottom:20px}.case{border:1px solid #ccc;border-radius:6px;margin-bottom:20px;page-break-inside:avoid;overflow:hidden}.ch{background:#f0f4fa;padding:10px 14px;border-bottom:1px solid #ccc}.ch h2{font-size:14px;font-weight:700}.ch .meta{font-size:11px;color:#555;margin-top:3px}.cb{padding:12px 14px}.sec{margin-bottom:12px}.st{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}table{width:100%;border-collapse:collapse;font-size:11px}th{background:#f5f5f5;font-weight:600;text-align:left;padding:5px 8px;border:1px solid #ddd}td{padding:5px 8px;border:1px solid #ddd;vertical-align:top}.msc{display:flex;flex-wrap:wrap;gap:6px}.msp{padding:3px 8px;border-radius:4px;font-size:11px;border:1px solid #bbb;background:#f5f5f5}.logs{padding:4px 0 4px 8px;border-left:2px solid #ddd;margin-top:4px}.lr{font-size:11px;margin-bottom:3px;color:#444}.ld{font-weight:600;color:#333;display:inline-block;min-width:80px}.memo{background:#fafafa;border:1px solid #ddd;border-radius:4px;padding:8px;font-size:12px;white-space:pre-wrap}.star{color:#e67e22}</style></head><body>`;html+=`<h1>contact control · 列印輸出 ${today()}</h1>`;db.cases.forEach(c=>{html+=`<div class="case"><div class="ch"><h2>${esc(c.name)}</h2>`;if(c.category||c.note)html+=`<div class="meta">${c.category?`[${esc(c.category)}] `:''}${c.note?esc(c.note):''}</div>`;html+=`</div><div class="cb">`;const mss=c.milestones||[];if(mss.length){html+=`<div class="sec"><div class="st">期程</div><div class="msc">`;mss.sort((a,b)=>a.date.localeCompare(b.date)).forEach(m=>{html+=`<span class="msp">${esc(m.label)} · ${m.date}</span>`;});html+=`</div></div>`;}const cts=c.contacts||[];if(cts.length){html+=`<div class="sec"><div class="st">聯絡人</div><table><tr><th>姓名</th><th>身份/職位</th><th>角色類別</th><th>電話</th><th>Email</th><th>說明</th><th>備註</th></tr>`;cts.forEach(ct=>{html+=`<tr><td>${esc(ct.name)}${ct.primary?' <span class="star">★</span>':''}</td><td>${esc(ct.role||'')}</td><td>${esc(ct.contactType||'')}</td><td>${esc(ct.phone||'')}</td><td>${esc(ct.email||'')}</td><td>${esc(ct.description||'')}</td><td>${esc(ct.note||'')}</td></tr>`;const logs=(ct.logs||[]).sort((a,b)=>b.date.localeCompare(a.date));if(logs.length){html+=`<tr><td colspan="7"><div class="logs">`;logs.forEach(l=>{html+=`<div class="lr"><span class="ld">${l.date}</span>${esc(l.content)}</div>`;});html+=`</div></td></tr>`;}});html+=`</table></div>`;}if(c.memo)html+=`<div class="sec"><div class="st">備忘欄</div><div class="memo">${esc(c.memo)}</div></div>`;html+=`</div></div>`;});html+=`</body></html>`;const w=window.open('','_blank');w.document.write(html);w.document.close();w.focus();setTimeout(()=>w.print(),400);}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.mo.open').forEach(m=>m.classList.remove('open'));if((e.ctrlKey||e.metaKey)&&e.key==='n'){e.preventDefault();openCaseModal();}});
loadData();setThemeMode(themeMode);setupSearch();updateStorage();renderCatChips();render();
setInterval(()=>{if(themeMode==='auto')applyTheme();},60000);
</script>
