<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>contact control</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#161a28;--sf:#1e2337;--sf2:#262c42;--sf3:#2d3450;--bd:#323d5a;--bd2:#3e4c6e;--ac:#5ba3ff;--acd:rgba(91,163,255,.12);--acg:rgba(91,163,255,.22);--tx:#dce6f5;--txm:#8494b5;--txf:#506080;--err:#f05252;--errd:rgba(240,82,82,.1);--ok:#3ecf8e;--warn:#f9a825;--warnd:rgba(249,168,37,.12);--r:8px;--rl:12px;--rx:16px}
[data-theme=light]{--bg:#f0f4fa;--sf:#fff;--sf2:#f5f8fd;--sf3:#eaeff8;--bd:#d4daea;--bd2:#bcc5d8;--ac:#2563eb;--acd:rgba(37,99,235,.08);--acg:rgba(37,99,235,.18);--tx:#1e2a45;--txm:#5a6888;--txf:#9baac0;--err:#dc2626;--errd:rgba(220,38,38,.08);--ok:#16a34a;--warn:#b45309;--warnd:rgba(180,83,9,.1)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--tx);font-size:15px;line-height:1.6;overflow:hidden;height:100vh;transition:background .3s,color .3s}
@keyframes breathe{0%,100%{opacity:1}50%{opacity:.18}}
.bl-slow{animation:breathe 2.5s ease-in-out infinite}
.bl-fast{animation:breathe 1.2s ease-in-out infinite}

header{height:50px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;padding:0 16px;flex-shrink:0}
.logo{font-size:15px;font-weight:700;color:var(--ac);display:flex;align-items:center;gap:8px;white-space:nowrap;flex-shrink:0}
.lic{width:26px;height:26px;background:var(--acd);border:1px solid var(--acg);border-radius:7px;display:flex;align-items:center;justify-content:center}
.hsp{flex:1}
.pill{display:flex;align-items:center;gap:6px;background:var(--sf2);border:1px solid var(--bd);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--txm);white-space:nowrap;flex-shrink:0}
.sbar{width:54px;height:3px;background:var(--bd2);border-radius:2px;overflow:hidden;flex-shrink:0}
.sfill{height:100%;border-radius:2px;transition:width .4s;background:var(--ac)}
.tg{display:flex;background:var(--sf2);border:1px solid var(--bd);border-radius:20px;padding:3px;gap:2px}
.tb{background:none;border:none;border-radius:14px;padding:3px 12px;font-size:12px;color:var(--txm);cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
.tb.active{background:var(--ac);color:#fff;font-weight:600}
.hbtn{background:none;border:1px solid var(--bd);border-radius:8px;padding:5px 10px;color:var(--txm);cursor:pointer;display:flex;align-items:center;gap:5px;font-size:12px;font-family:inherit;transition:all .15s;flex-shrink:0;white-space:nowrap}
.hbtn:hover{border-color:var(--ac);color:var(--ac);background:var(--acd)}

.toolbar{height:52px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;padding:0 16px;flex-shrink:0}
.sw{position:relative}
.swa{width:210px}.swb{width:210px}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txf);pointer-events:none;display:flex}
.sinput{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r);padding:8px 10px 8px 34px;color:var(--tx);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s}
.sinput:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acd)}
.sinput::placeholder{color:var(--txf)}
.tsep{width:1px;height:26px;background:var(--bd);flex-shrink:0;margin:0 2px}
.tbsp{flex:1}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r);font-size:13px;font-family:inherit;cursor:pointer;border:1px solid var(--bd);background:var(--sf2);color:var(--tx);transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--ac);color:var(--ac);background:var(--acd)}
.btn-p{background:var(--ac);border-color:var(--ac);color:#fff;font-weight:600}
.btn-p:hover{opacity:.88;color:#fff;background:var(--ac)}
.btn-sm{padding:6px 11px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:12px}
.btn-gh{border-color:transparent;background:none;color:var(--txm)}
.btn-gh:hover{border-color:var(--bd);background:var(--sf2);color:var(--tx)}

.layout{display:flex;height:calc(100vh - 102px);overflow:hidden}

.lp{width:300px;flex-shrink:0;display:flex;flex-direction:column;background:var(--sf);border-right:1px solid var(--bd)}
.lp-top{padding:12px;border-bottom:1px solid var(--bd);flex-shrink:0}
.fl-label{font-size:11px;color:var(--txf);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.cat-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.chip{padding:4px 12px;border-radius:16px;font-size:12px;cursor:pointer;border:1px solid var(--bd);background:none;color:var(--txm);transition:all .15s;font-family:inherit}
.chip:hover,.chip.active{background:var(--acd);border-color:var(--ac);color:var(--ac);font-weight:600}
.sort-row{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.slabel{font-size:11px;color:var(--txf);flex-shrink:0;margin-right:2px}
.sbtn{padding:3px 9px;border-radius:12px;font-size:11px;cursor:pointer;border:1px solid var(--bd);background:none;color:var(--txm);transition:all .15s;font-family:inherit}
.sbtn.active{background:var(--acd);border-color:var(--ac);color:var(--ac);font-weight:600}
.lp-list{flex:1;overflow-y:auto}
.lp-empty{padding:3rem 1rem;text-align:center;color:var(--txm);font-size:14px}
.lp-bottom{padding:10px;border-top:1px solid var(--bd);flex-shrink:0}

.ci{display:flex;align-items:flex-start;gap:8px;padding:12px 12px 12px 13px;cursor:pointer;border-left:3px solid transparent;border-bottom:1px solid var(--bd);transition:background .15s}
.ci:hover{background:var(--sf2)}
.ci.sel{background:var(--acd)}
.ci-body{flex:1;min-width:0}
.ci-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;line-height:1.3}
.ci-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.cat-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;flex-shrink:0;line-height:1.4}
.ci-pc{font-size:12px;color:var(--txm);display:flex;align-items:center;gap:3px}
.ci-bottom{display:flex;align-items:center;gap:6px}
.ms-dots{display:flex;gap:4px;align-items:center}
.ms-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.ci-cnt{font-size:12px;color:var(--txf)}
.ci-acts{display:flex;gap:2px;opacity:0;transition:opacity .15s;flex-shrink:0;margin-top:1px}
.ci:hover .ci-acts{opacity:1}

.rp{flex:1;overflow-y:auto;background:var(--bg)}
.rp-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--txm)}
.rp-empty-icon{font-size:52px;opacity:.1;margin-bottom:1rem}
.rp-empty-txt{font-size:15px}

.cd-head{position:relative;overflow:hidden;background:var(--sf);border-bottom:1px solid var(--bd);padding:20px 24px 18px}
.cd-accent{position:absolute;left:0;top:0;bottom:0;width:5px}
.cd-top{display:flex;align-items:flex-start;gap:12px;padding-left:10px}
.cd-title{flex:1;min-width:0}
.cd-badge{margin-bottom:8px}
.cd-name{font-size:20px;font-weight:700;line-height:1.3;margin-bottom:4px}
.cd-note-txt{font-size:14px;color:var(--txm)}
.cd-hacts{display:flex;gap:6px;flex-shrink:0;padding-top:2px}
.cd-sec{padding:18px 24px;border-bottom:1px solid var(--bd)}
.cd-sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:12px;font-weight:700;color:var(--txm);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:6px}

.ms-grid{display:flex;flex-wrap:wrap;gap:8px}
.ms-card{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r);border:1px solid var(--bd);background:var(--sf2);cursor:pointer;font-family:inherit;font-size:13px;color:var(--txm);transition:border-color .15s}
.ms-card:hover{border-color:var(--bd2)}
.ms-card.overdue{border-color:var(--err);background:var(--errd);color:var(--err)}
.ms-card.urgent,.ms-card.soon{border-color:var(--warn);background:var(--warnd);color:var(--warn)}
.ms-lbl{font-weight:600}
.ms-dt{font-size:12px;opacity:.8}
.ms-del-btn{background:none;border:none;cursor:pointer;color:inherit;opacity:.35;padding:1px 0 1px 4px;font-size:18px;line-height:1;display:flex;align-items:center}
.ms-del-btn:hover{opacity:1}

.ct-list{display:flex;flex-direction:column;gap:10px}
.ct-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;transition:border-color .2s}
.ct-card:hover{border-color:var(--bd2)}
.ct-head{display:flex;align-items:flex-start;gap:12px;padding:14px 16px 10px}
.av{width:38px;height:38px;border-radius:50%;background:var(--acd);color:var(--ac);border:1px solid var(--acg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.ct-info{flex:1;min-width:0}
.ct-nr{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:3px}
.ct-name{font-size:16px;font-weight:700}
.bp{font-size:10px;padding:1px 6px;border-radius:6px;background:var(--acd);color:var(--ac);border:1px solid var(--acg);font-weight:700}
.ct-role{font-size:12px;color:var(--txf)}
/* 角色類別 badge */
.ct-type{font-size:11px;padding:2px 7px;border-radius:8px;font-weight:600;flex-shrink:0}
.ct-type-owner{background:rgba(249,168,37,.15);color:var(--warn);border:1px solid rgba(249,168,37,.3)}
.ct-type-sub{background:rgba(62,207,142,.13);color:var(--ok);border:1px solid rgba(62,207,142,.3)}
.ct-type-plan{background:var(--acd);color:var(--ac);border:1px solid var(--acg)}
.ct-dets{display:flex;flex-wrap:wrap;gap:14px;margin-top:4px}
.df{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--txm)}
.cpbtn{background:none;border:none;cursor:pointer;color:var(--txf);padding:3px;border-radius:4px;display:flex;align-items:center;transition:all .15s}
.cpbtn:hover{color:var(--ac);background:var(--acd)}
.ct-desc{padding:0 16px 8px;font-size:13px;color:var(--txm);border-top:1px solid var(--bd);padding-top:8px}
.ct-desc-label{font-size:11px;color:var(--txf);font-weight:600;margin-bottom:2px}
.ct-note{padding:0 16px 10px;font-size:13px;color:var(--txf)}
.ct-hacts{display:flex;gap:4px;flex-shrink:0}

.log-sec{border-top:1px solid var(--bd);padding:10px 16px}
.log-tog{background:none;border:none;cursor:pointer;font-size:13px;color:var(--txm);font-family:inherit;display:flex;align-items:center;gap:5px;padding:2px 0;transition:color .15s;width:100%;text-align:left}
.log-tog:hover{color:var(--ac)}
.log-tic{transition:transform .2s;display:flex;align-items:center}
.log-open .log-tic{transform:rotate(90deg);color:var(--ac)}
.log-body{display:none;margin-top:10px;border-top:1px solid var(--bd);padding-top:10px}
.log-open .log-body{display:block}
.log-item{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--bd)}
.log-item:last-of-type{border-bottom:none}
.log-date{font-size:12px;color:var(--txf);font-weight:600;width:90px;flex-shrink:0;padding-top:1px}
.log-content{flex:1;font-size:13px;color:var(--txm);white-space:pre-wrap;word-break:break-all}
.log-del-btn{background:none;border:none;cursor:pointer;color:var(--txf);display:flex;align-items:flex-start;padding:2px;opacity:0;transition:opacity .15s;flex-shrink:0}
.log-item:hover .log-del-btn{opacity:1}
.log-del-btn:hover{color:var(--err)}
.log-add{margin-top:10px}

.memo-sec{padding:20px 24px}
.memo-title{font-size:12px;font-weight:700;color:var(--txm);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.memo-ta{width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:12px;color:var(--tx);font-size:14px;font-family:inherit;outline:none;resize:vertical;min-height:100px;transition:border-color .2s}
.memo-ta:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acd)}
.memo-ta::placeholder{color:var(--txf)}

.ibtn{background:none;border:1px solid transparent;border-radius:6px;padding:5px;cursor:pointer;color:var(--txf);display:flex;align-items:center;transition:all .15s}
.ibtn:hover{color:var(--ac);border-color:var(--bd);background:var(--acd)}
.ibtn.del:hover{color:var(--err);border-color:rgba(240,82,82,.3);background:var(--errd)}

.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:center;justify-content:center}
.mo.open{display:flex}
.md{background:var(--sf);border:1px solid var(--bd2);border-radius:var(--rx);width:100%;max-width:500px;margin:1rem;animation:fup .18s ease;max-height:90vh;overflow-y:auto}
.md-w{max-width:520px}
@keyframes fup{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--sf);z-index:1}
.mt{font-weight:700;font-size:15px}
.mcl{background:none;border:none;cursor:pointer;color:var(--txm);padding:5px;border-radius:6px;display:flex;transition:all .15s}
.mcl:hover{color:var(--tx);background:var(--sf2)}
.mb{padding:18px}
.mf{padding:12px 18px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--sf)}
.fg{margin-bottom:14px}
.fg:last-child{margin-bottom:0}
.fl{display:block;font-size:12px;color:var(--txm);margin-bottom:5px;font-weight:600;letter-spacing:.03em}
.fr{color:var(--ac)}
.fi,.fs,.fta{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r);padding:9px 12px;color:var(--tx);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acd)}
.fi::placeholder,.fta::placeholder{color:var(--txf)}
.fs{appearance:none;cursor:pointer}
.fs option{background:var(--sf);color:var(--tx)}
.fta{resize:vertical;min-height:72px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fck{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--txm)}
.fck input{accent-color:var(--ac);width:15px;height:15px;cursor:pointer}
.fsub{margin-top:8px;padding:10px 12px;background:var(--sf2);border-radius:var(--r);border:1px solid var(--bd)}
.fsub-label{font-size:11px;color:var(--txm);margin-bottom:5px;font-weight:600}

.scat-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:var(--r);margin-bottom:5px;background:var(--sf2);font-size:13px;border:1px solid var(--bd)}
.scat-nm{display:flex;align-items:center;gap:9px}
.scat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.scat-add{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--bd)}

#toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:300;background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r);padding:10px 16px;font-size:13px;display:none;align-items:center;gap:9px;box-shadow:0 6px 24px rgba(0,0,0,.4);pointer-events:none;max-width:320px}
@keyframes tsi{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
mark{background:rgba(91,163,255,.2);color:var(--ac);border-radius:2px;padding:0 1px}
[data-theme=light] mark{background:rgba(37,99,235,.14)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="lic"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>
    contact control
  </div>
  <div class="hsp"></div>
  <div class="pill" id="sunrisePill" style="display:none">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/></svg>
    <span id="sunriseText"></span>
  </div>
  <div class="pill">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
    <span id="storageText">—</span>
    <div class="sbar"><div class="sfill" id="storageFill"></div></div>
  </div>
  <div class="tg">
    <button class="tb" id="btnAuto"  onclick="setThemeMode('auto')">自動</button>
    <button class="tb" id="btnLight" onclick="setThemeMode('light')">淺色</button>
    <button class="tb" id="btnDark"  onclick="setThemeMode('dark')">深色</button>
  </div>
  <button class="hbtn" onclick="openSettings()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 0-14.14 0M4.93 19.07a10 10 0 0 0 14.14 0M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
    類別管理
  </button>
</header>

<div class="toolbar">
  <div class="sw swa">
    <span class="si"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
    <input class="sinput" id="searchCase" placeholder="搜尋案件… (Enter)" type="search" autocomplete="off">
  </div>
  <div class="sw swb">
    <span class="si"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
    <input class="sinput" id="searchContact" placeholder="搜尋聯絡人… (Enter)" type="search" autocomplete="off">
  </div>
  <div class="tsep"></div>
  <button class="btn btn-sm" onclick="exportJSON()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>JSON</button>
  <button class="btn btn-sm" onclick="triggerImport()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>匯入</button>
  <button class="btn btn-sm" onclick="exportCSV()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>CSV</button>

<script>
const SK='caseManager_v4';
const DEF_CATS=['環評','環差','監測','許可申請','土污','廢棄物','溫室氣體','其他'];
const BASE_COL={'環評':[91,163,255],'環差':[168,111,208],'監測':[29,206,155],'許可申請':[249,168,37],'土污':[240,82,82],'廢棄物':[130,145,165],'溫室氣體':[62,207,142],'其他':[130,145,165]};
const TYPE_INFO={業主:{cls:'ct-type-owner',label:'業主'},下包:{cls:'ct-type-sub',label:'下包'},規劃團隊:{cls:'ct-type-plan',label:'規劃團隊'}};

function catCol(cat){
  if(!cat)return['var(--acd)','var(--ac)'];
  if(BASE_COL[cat]){const[r,g,b]=BASE_COL[cat];return[`rgba(${r},${g},${b},.14)`,`rgb(${r},${g},${b})`];}
  let h=0;for(let i=0;i<cat.length;i++)h=(h*37+cat.charCodeAt(i))%360;
  return[`hsla(${h},55%,62%,.14)`,`hsl(${h},55%,62%)`];
}

let db={categories:[...DEF_CATS],cases:[]};
let selId=null,sortKey='newest',filterCat='',searchCaseQ='',searchCtQ='';
let themeMode=localStorage.getItem('themeMode')||'auto';

function loadData(){
  try{
    const r=localStorage.getItem(SK);
    if(r)db=JSON.parse(r);
    if(!db.categories)db.categories=[...DEF_CATS];
    db.cases.forEach(c=>{
      if(!c.milestones)c.milestones=[];
      if(!c.contacts)c.contacts=[];
      if(c.memo==null)c.memo='';
      if(!c.createdAt)c.createdAt=Date.now();
      c.contacts.forEach(ct=>{if(!ct.logs)ct.logs=[];});
    });
  }catch{db={categories:[...DEF_CATS],cases:[]};}
}

function cleanDb(){
  return{categories:db.categories,cases:db.cases.map(c=>{
    const{_x,...rest}=c;
    return{...rest,contacts:(rest.contacts||[]).map(ct=>{const{_logsOpen,...rc}=ct;return rc;})};
  })};
}
function saveData(){localStorage.setItem(SK,JSON.stringify(cleanDb()));updateStorage();}
function updateStorage(){
  const bytes=new TextEncoder().encode(localStorage.getItem(SK)||'').length;
  const kb=(bytes/1024).toFixed(1);const pct=Math.min(100,(bytes/(5*1024*1024))*100);
  document.getElementById('storageText').textContent=`${kb} KB / 5 MB`;
  const f=document.getElementById('storageFill');
  f.style.width=pct.toFixed(1)+'%';
  f.style.background=pct>80?'var(--err)':pct>50?'var(--warn)':'var(--ac)';
}

function getSunTimes(){
  const twStr=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Taipei'});
  const[yr,mo,dy]=twStr.split('-').map(Number);
  const day=Math.round((new Date(yr,mo-1,dy)-new Date(yr,0,0))/86400000);
  const lat=24.1477*Math.PI/180;
  const decl=-23.45*Math.cos(2*Math.PI/365*(day+10))*Math.PI/180;
  const cosH=-Math.tan(lat)*Math.tan(decl);
  const H=Math.acos(Math.max(-1,Math.min(1,cosH)))*180/Math.PI;
  const noon=12-(120.6736-120)/15;
  return{rH:noon-H/15,sH:noon+H/15};
}
function hhmm(h){const hh=Math.floor(h),mm=Math.round((h-hh)*60)%60;return`${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;}
function applyTheme(){
  let dark=false;const pill=document.getElementById('sunrisePill');
  if(themeMode==='dark'){dark=true;pill.style.display='none';}
  else if(themeMode==='light'){dark=false;pill.style.display='none';}
  else{
    const{rH,sH}=getSunTimes();
    const tw=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Taipei'}));
    const cur=tw.getHours()+tw.getMinutes()/60;
    dark=cur<rH||cur>=sH;
    document.getElementById('sunriseText').textContent=`台中 日出 ${hhmm(rH)} · 日落 ${hhmm(sH)}`;
    pill.style.display='flex';
  }
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
}
function setThemeMode(mode){
  themeMode=mode;localStorage.setItem('themeMode',mode);applyTheme();
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
  document.getElementById({auto:'btnAuto',light:'btnLight',dark:'btnDark'}[mode]).classList.add('active');
}

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function hl(text,q){if(!q)return esc(text);const e=esc(text),eq=esc(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return e.replace(new RegExp(eq,'gi'),m=>`<mark>${m}</mark>`);}
function ini(n){const c=[...(n||'').trim()];return c.length>=2?c[0]+c[c.length-1]:c[0]||'?';}
const today=()=>new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Taipei'});
function urgency(d){const t=new Date();t.setHours(0,0,0,0);const x=new Date(d);x.setHours(0,0,0,0);const diff=(x-t)/86400000;return diff<0?'overdue':diff<=7?'urgent':diff<=30?'soon':'normal';}
function nearestMs(c){const t=new Date();t.setHours(0,0,0,0);const f=(c.milestones||[]).map(m=>new Date(m.date)).filter(d=>{const x=new Date(d);x.setHours(0,0,0,0);return x>=t;});return f.length?Math.min(...f.map(d=>d.getTime())):Infinity;}

function visCases(){
  let cs=db.cases;
  if(filterCat)cs=cs.filter(c=>c.category===filterCat);
  if(searchCaseQ)cs=cs.filter(c=>c.name.toLowerCase().includes(searchCaseQ.toLowerCase()));
  if(searchCtQ){const q=searchCtQ.toLowerCase();cs=cs.filter(c=>(c.contacts||[]).some(ct=>ct.name.toLowerCase().includes(q)));}
  return sortArr(cs);
}
function sortArr(a){
  const arr=[...a];
  if(sortKey==='newest')return arr.sort((x,y)=>(y.createdAt||0)-(x.createdAt||0));
  if(sortKey==='oldest')return arr.sort((x,y)=>(x.createdAt||0)-(y.createdAt||0));
  if(sortKey==='name')return arr.sort((x,y)=>x.name.localeCompare(y.name,'zh-TW'));
  if(sortKey==='cat')return arr.sort((x,y)=>(x.category||'').localeCompare(y.category||'','zh-TW'));
  if(sortKey==='ms')return arr.sort((x,y)=>nearestMs(x)-nearestMs(y));
  return arr;
}
function setSort(el,key){sortKey=key;document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderLeft();}

function renderCatChips(){
  document.getElementById('catChips').innerHTML=
    `<button class="chip ${filterCat===''?'active':''}" onclick="doFC(this,'')">全部</button>`+
    db.categories.map(c=>`<button class="chip ${filterCat===c?'active':''}" onclick="doFC(this,'${esc(c)}')">${esc(c)}</button>`).join('');
}
function doFC(el,cat){filterCat=cat;document.querySelectorAll('#catChips .chip').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderLeft();}
function buildSel(el,cur){el.innerHTML='<option value="">— 請選擇 —</option>'+db.categories.map(c=>`<option value="${esc(c)}" ${c===cur?'selected':''}>${esc(c)}</option>`).join('');}

function renderLeft(){
  const cs=visCases();const el=document.getElementById('lpList');
  if(!cs.length){el.innerHTML=`<div class="lp-empty">${!db.cases.length?'尚無案件，請點右上角「新增案件」':'無符合條件的案件'}</div>`;return;}
  el.innerHTML=cs.map(c=>{
    const primary=(c.contacts||[]).find(ct=>ct.primary);
    const col=catCol(c.category);const isSel=c.id===selId;
    const bCol=isSel?(c.category?col[1]:'var(--ac)'):'transparent';
    const dots=(c.milestones||[]).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5).map(m=>{
      const urg=urgency(m.date);const dc=urg==='overdue'?'var(--err)':urg!=='normal'?'var(--warn)':'var(--txf)';
      const ac=urg==='overdue'?' bl-fast':urg==='urgent'?' bl-slow':'';
      return`<span class="ms-dot${ac}" style="background:${dc}" title="${esc(m.label)} · ${m.date}"></span>`;
    }).join('');
    return`<div class="ci ${isSel?'sel':''}" style="border-left-color:${bCol}" id="ci-${c.id}" onclick="selCase('${c.id}')">
      <div class="ci-body">
        <div class="ci-name">${hl(c.name,searchCaseQ)}</div>
        <div class="ci-meta">
          ${c.category?`<span class="cat-badge" style="background:${col[0]};color:${col[1]}">${esc(c.category)}</span>`:''}
          ${primary?`<span class="ci-pc"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>${esc(primary.name)}</span>`:''}
        </div>
        <div class="ci-bottom"><div class="ms-dots">${dots}</div><span class="ci-cnt">${(c.contacts||[]).length} 位聯絡人</span></div>
      </div>
      <div class="ci-acts" onclick="event.stopPropagation()">
        <button class="ibtn" onclick="openCaseModal('${c.id}')" title="編輯"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="ibtn del" onclick="deleteCase('${c.id}')" title="刪除"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
      </div>
    </div>`;
  }).join('');
}

function renderRight(){
  const rp=document.getElementById('rp');const c=db.cases.find(c=>c.id===selId);
  if(!c){rp.innerHTML=`<div class="rp-empty"><div class="rp-empty-icon">📋</div><p class="rp-empty-txt">點選左側案件查看詳情</p></div>`;return;}
  const sy=rp.scrollTop;const col=catCol(c.category);const acCol=c.category?col[1]:'var(--ac)';
  const mss=(c.milestones||[]).sort((a,b)=>a.date.localeCompare(b.date));
  const msHtml=mss.map(m=>{
    const urg=urgency(m.date);const an=urg==='overdue'?' bl-fast':urg==='urgent'?' bl-slow':'';
    return`<button class="ms-card ${urg}${an}" onclick="openMsModal('${c.id}','${m.id}')">
      <span class="ms-lbl">${esc(m.label)}</span><span class="ms-dt">${m.date}</span>
      <span class="ms-del-btn" onclick="event.stopPropagation();deleteMilestone('${c.id}','${m.id}')">×</span>
    </button>`;
  }).join('');
  const ctHtml=(c.contacts||[]).map(ct=>renderCtCard(c.id,ct)).join('');
  rp.innerHTML=`<div>
    <div class="cd-head">
      <div class="cd-accent" style="background:${acCol}"></div>
      <div class="cd-top">
        <div class="cd-title">
          ${c.category?`<div class="cd-badge"><span class="cat-badge" style="background:${col[0]};color:${col[1]}">${esc(c.category)}</span></div>`:''}
          <div class="cd-name">${esc(c.name)}</div>
          ${c.note?`<div class="cd-note-txt">${esc(c.note)}</div>`:''}
        </div>
        <div class="cd-hacts">
          <button class="btn btn-sm" onclick="openCaseModal('${c.id}')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>編輯</button>
          <button class="btn btn-sm" style="color:var(--err);border-color:rgba(240,82,82,.3)" onclick="deleteCase('${c.id}')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>刪除</button>
        </div>
      </div>
    </div>
    <div class="cd-sec">
      <div class="cd-sec-hd">

function render(){renderLeft();renderRight();}
function selCase(id){selId=id;renderLeft();renderRight();}

/* ── Case CRUD ── */
function openCaseModal(id){
  document.getElementById('caseMT').textContent=id?'編輯案件':'新增案件';
  document.getElementById('caseId').value=id||'';
  const c=id?db.cases.find(c=>c.id===id):null;
  document.getElementById('caseName').value=c?c.name:'';
  document.getElementById('caseNote').value=c?(c.note||''):'';
  buildSel(document.getElementById('caseCat'),c?c.category:'');
  openMo('caseModal');setTimeout(()=>document.getElementById('caseName').focus(),80);
}
function saveCase(){
  const name=document.getElementById('caseName').value.trim();
  if(!name){showToast('⚠ 請輸入案件名稱','warn');return;}
  const id=document.getElementById('caseId').value;
  const category=document.getElementById('caseCat').value;
  const note=document.getElementById('caseNote').value.trim();
  if(id){const c=db.cases.find(c=>c.id===id);if(c){c.name=name;c.category=category;c.note=note;}}
  else{const nc={id:uid(),name,category,note,memo:'',milestones:[],contacts:[],createdAt:Date.now()};db.cases.unshift(nc);selId=nc.id;}
  saveData();renderCatChips();render();closeMo('caseModal');showToast(id?'✓ 案件已更新':'✓ 案件已新增');
}
function deleteCase(id){
  const c=db.cases.find(c=>c.id===id);
  if(!c||!confirm(`確定刪除案件「${c.name}」及其所有資料？`))return;
  db.cases=db.cases.filter(c=>c.id!==id);
  if(selId===id)selId=null;
  saveData();render();showToast('案件已刪除','warn');
}

/* ── Contact Modal ── */
function onCtTypeChange(){
  const val=document.getElementById('ctType').value;
  document.getElementById('ctSubWrap').style.display=val==='下包'?'block':'none';
  if(val!=='下包')document.getElementById('ctTypeDetail').value='';
}
function openContactModal(caseId,ctId){
  document.getElementById('contactMT').textContent=ctId?'編輯聯絡人':'新增聯絡人';
  document.getElementById('ctCaseId').value=caseId;
  document.getElementById('ctId').value=ctId||'';
  const c=db.cases.find(c=>c.id===caseId);
  const ct=ctId&&c?c.contacts.find(ct=>ct.id===ctId):null;
  document.getElementById('ctName').value=ct?ct.name:'';
  document.getElementById('ctRole').value=ct?(ct.role||''):'';
  document.getElementById('ctType').value=ct?(ct.contactType||''):'';
  document.getElementById('ctTypeDetail').value=ct?(ct.contactTypeDetail||''):'';
  document.getElementById('ctDesc').value=ct?(ct.description||''):'';
  document.getElementById('ctPhone').value=ct?(ct.phone||''):'';
  document.getElementById('ctEmail').value=ct?(ct.email||''):'';
  document.getElementById('ctNote').value=ct?(ct.note||''):'';
  document.getElementById('ctPrimary').checked=ct?!!ct.primary:false;
  document.getElementById('ctSubWrap').style.display=(ct&&ct.contactType==='下包')?'block':'none';
  openMo('contactModal');setTimeout(()=>document.getElementById('ctName').focus(),80);
}
function saveContact(){
  const name=document.getElementById('ctName').value.trim();
  if(!name){showToast('⚠ 請輸入姓名','warn');return;}
  const caseId=document.getElementById('ctCaseId').value;
  const ctId=document.getElementById('ctId').value;
  const c=db.cases.find(c=>c.id===caseId);if(!c)return;
  const isPrimary=document.getElementById('ctPrimary').checked;
  if(isPrimary)c.contacts.forEach(ct=>ct.primary=false);
  const contactType=document.getElementById('ctType').value;
  const p={
    name,
    role:document.getElementById('ctRole').value.trim(),
    contactType,
    contactTypeDetail:contactType==='下包'?document.getElementById('ctTypeDetail').value.trim():'',
    description:document.getElementById('ctDesc').value.trim(),
    phone:document.getElementById('ctPhone').value.trim(),
    email:document.getElementById('ctEmail').value.trim(),
    note:document.getElementById('ctNote').value.trim(),
    primary:isPrimary
  };
  if(ctId){const ct=c.contacts.find(ct=>ct.id===ctId);if(ct)Object.assign(ct,p);}
  else{c.contacts.push({id:uid(),logs:[],...p});}
  saveData();renderRight();closeMo('contactModal');showToast(ctId?'✓ 聯絡人已更新':'✓ 聯絡人已新增');
}
function deleteContact(caseId,ctId){
  const c=db.cases.find(c=>c.id===caseId);if(!c)return;
  const ct=c.contacts.find(ct=>ct.id===ctId);
  if(!ct||!confirm(`確定刪除聯絡人「${ct.name}」？`))return;
  c.contacts=c.contacts.filter(ct=>ct.id!==ctId);
  saveData();render();showToast('聯絡人已刪除','warn');
}

/* ── Milestone CRUD ── */

  document.getElementById('msLabel').value=m?m.label:'';document.getElementById('msDate').value=m?m.date:today();
  openMo('msModal');setTimeout(()=>document.getElementById('msLabel').focus(),80);

function saveMilestone(){
  const label=document.getElementById('msLabel').value.trim();const date=document.getElementById('msDate').value;
  if(!label||!date){showToast('⚠ 請填入名稱與日期','warn');return;}
  const caseId=document.getElementById('msCaseId').value;const msId=document.getElementById('msId').value;
  const c=db.cases.find(c=>c.id===caseId);if(!c)return;
  if(msId){const m=c.milestones.find(m=>m.id===msId);if(m){m.label=label;m.date=date;}}
  else{c.milestones.push({id:uid(),label,date});}
  saveData();renderLeft();renderRight();closeMo('msModal');showToast(msId?'✓ 期程已更新':'✓ 期程已新增');

function deleteMilestone(caseId,msId){
  const c=db.cases.find(c=>c.id===caseId);if(!c)return;
  if(!confirm('確定刪除此期程？'))return;
  c.milestones=c.milestones.filter(m=>m.id!==msId);
  saveData();renderLeft();renderRight();

/* ── Log CRUD ── */
function openLogModal(caseId,ctId,logId){
  document.getElementById('logMT').textContent=logId?'編輯記錄':'新增聯絡記錄';
  document.getElementById('logCaseId').value=caseId;document.getElementById('logCtId').value=ctId;document.getElementById('logId').value=logId||'';
  const c=db.cases.find(c=>c.id===caseId);const ct=c&&c.contacts.find(ct=>ct.id===ctId);
  const l=logId&&ct?ct.logs.find(l=>l.id===logId):null;
  document.getElementById('logDate').value=l?l.date:today();document.getElementById('logContent').value=l?l.content:'';
  openMo('logModal');setTimeout(()=>document.getElementById('logContent').focus(),80);
}
function saveLog(){
  const date=document.getElementById('logDate').value;const content=document.getElementById('logContent').value.trim();
  if(!date||!content){showToast('⚠ 請填入日期與內容','warn');return;}
  const caseId=document.getElementById('logCaseId').value;const ctId=document.getElementById('logCtId').value;const logId=document.getElementById('logId').value;
  const c=db.cases.find(c=>c.id===caseId);if(!c)return;const ct=c.contacts.find(ct=>ct.id===ctId);if(!ct)return;
  if(logId){const l=ct.logs.find(l=>l.id===logId);if(l){l.date=date;l.content=content;}}
  else{ct.logs.push({id:uid(),date,content});ct._logsOpen=true;}
  saveData();renderRight();closeMo('logModal');showToast(logId?'✓ 記錄已更新':'✓ 記錄已新增');
}
function deleteLog(caseId,ctId,logId){
  const c=db.cases.find(c=>c.id===caseId);if(!c)return;const ct=c.contacts.find(ct=>ct.id===ctId);if(!ct)return;
  if(!confirm('確定刪除此聯絡記錄？'))return;
  ct.logs=ct.logs.filter(l=>l.id!==logId);saveData();renderRight();
}
function toggleLogs(caseId,ctId){
  const c=db.cases.find(c=>c.id===caseId);if(!c)return;const ct=c.contacts.find(ct=>ct.id===ctId);if(!ct)return;
  ct._logsOpen=!ct._logsOpen;renderRight();
}

function saveMemo(caseId,val){const c=db.cases.find(c=>c.id===caseId);if(!c)return;if(c.memo!==val){c.memo=val;saveData();}}

function addCategory(){

function deleteCat(cat){
  const used=db.cases.filter(c=>c.category===cat).length;
  if(!confirm(used?`有 ${used} 個案件使用此類別，刪除後類別將清空。確定？`:`確定刪除類別「${cat}」？`))return;
  if(used)db.cases.forEach(c=>{if(c.category===cat)c.category='';});
  db.categories=db.categories.filter(c=>c!==cat);

function copyText(text,label){navigator.clipboard.writeText(text).then(()=>showToast(`✓ ${label} 已複製`)).catch(()=>showToast('複製失敗','warn'));}
let _tt;
function showToast(msg,type){
  const t=document.getElementById('toast');t.style.display='flex';t.style.animation='none';t.offsetHeight;t.style.animation='tsi .2s ease';
  t.innerHTML=`<span style="color:${type==='warn'?'var(--warn)':'var(--ok)'}">●</span><span>${esc(msg)}</span>`;

function exportJSON(){
  const blob=new Blob([JSON.stringify(cleanDb(),null,2)],{type:'application/json'});
  dlBlob(blob,`contact_control_${today()}.json`);showToast('✓ JSON 匯出完成，可上傳 GitHub 備份');
}
function triggerImport(){document.getElementById('importInput').click();}
function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const imp=JSON.parse(ev.target.result);if(!Array.isArray(imp.cases))throw 0;
      if(!confirm(`確定匯入？現有 ${db.cases.length} 筆案件將被覆蓋。`))return;
      db=imp;if(!db.categories)db.categories=[...DEF_CATS];
      db.cases.forEach(c=>{
        if(!c.milestones)c.milestones=[];if(!c.contacts)c.contacts=[];if(c.memo==null)c.memo='';if(!c.createdAt)c.createdAt=Date.now();
        c.contacts.forEach(ct=>{if(!ct.logs)ct.logs=[];});
      });
      selId=null;saveData();renderCatChips();render();showToast(`✓ 已匯入 ${db.cases.length} 筆案件`);
    }catch{showToast('⚠ 匯入失敗：請確認為有效 JSON 備份','warn');}
    e.target.value='';
  };reader.readAsText(file);
}
function exportCSV(){
  const rows=[['案件名稱','類別','案件備註','期程','聯絡人姓名','身份/職位','角色類別','負責項目','說明','電話','Email','備註','主要聯絡人']];
  db.cases.forEach(c=>{
    const mss=c.milestones||[];const cts=c.contacts||[];
    const msStr=mss.map(m=>`${m.label}(${m.date})`).join('；');
    if(!cts.length){rows.push([c.name,c.category||'',c.note||'',msStr,'','','','','','','','','']);return;}
    cts.forEach(ct=>rows.push([c.name,c.category||'',c.note||'',msStr,ct.name,ct.role||'',ct.contactType||'',ct.contactTypeDetail||'',ct.description||'',ct.phone||'',ct.email||'',ct.note||'',ct.primary?'是':'']));
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  dlBlob(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}),`contact_control_${today()}.csv`);
  showToast('✓ CSV 匯出完成');
}
function dlBlob(blob,name){const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:name});a.click();}

  .msc{display:flex;flex-wrap:wrap;gap:6px}.msp{padding:3px 8px;border-radius:4px;font-size:11px;border:1px solid #bbb;background:#f5f5f5}
  .logs{padding:4px 0 4px 8px;border-left:2px solid #ddd;margin-top:4px}
  .lr{font-size:11px;margin-bottom:3px;color:#444}.ld{font-weight:600;color:#333;display:inline-block;min-width:80px}
  .memo{background:#fafafa;border:1px solid #ddd;border-radius:4px;padding:8px;font-size:12px;white-space:pre-wrap}
  .star{color:#e67e22}
  </style></head><body>`;
  html+=`<h1>contact control &ensp;·&ensp; 列印輸出 ${today()}</h1>`;
  db.cases.forEach(c=>{
    html+=`<div class="case"><div class="ch"><h2>${esc(c.name)}</h2>`;
    if(c.category||c.note)html+=`<div class="meta">${c.category?`[${esc(c.category)}] `:''} ${c.note?esc(c.note):''}</div>`;
    html+=`</div><div class="cb">`;
    const mss=c.milestones||[];
    if(mss.length){html+=`<div class="sec"><div class="st">期程</div><div class="msc">`;mss.sort((a,b)=>a.date.localeCompare(b.date)).forEach(m=>{html+=`<span class="msp">${esc(m.label)} · ${m.date}</span>`;});html+=`</div></div>`;}
    const cts=c.contacts||[];
    if(cts.length){
      html+=`<div class="sec"><div class="st">聯絡人</div><table><tr><th>姓名</th><th>身份/職位</th><th>角色</th><th>電話</th><th>Email</th><th>說明</th><th>備註</th></tr>`;
      cts.forEach(ct=>{
        const typeStr=ct.contactType?(ct.contactType+(ct.contactTypeDetail?` (${ct.contactTypeDetail})`:'')):'';
        html+=`<tr><td>${esc(ct.name)}${ct.primary?' <span class="star">★</span>':''}</td><td>${esc(ct.role||'')}</td><td>${esc(typeStr)}</td><td>${esc(ct.phone||'')}</td><td>${esc(ct.email||'')}</td><td>${esc(ct.description||'')}</td><td>${esc(ct.note||'')}</td></tr>`;
        const logs=(ct.logs||[]).sort((a,b)=>b.date.localeCompare(a.date));
        if(logs.length){html+=`<tr><td colspan="7"><div class="logs">`;logs.forEach(l=>{html+=`<div class="lr"><span class="ld">${l.date}</span>${esc(l.content)}</div>`;});html+=`</div></td></tr>`;}
      });
      html+=`</table></div>`;
    }
    if(c.memo)html+=`<div class="sec"><div class="st">備忘欄</div><div class="memo">${esc(c.memo)}</div></div>`;
    html+=`</div></div>`;
  });
  html+=`</body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close();w.focus();setTimeout(()=>w.print(),400);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape')document.querySelectorAll('.mo.open').forEach(m=>m.classList.remove('open'));
  if((e.ctrlKey||e.metaKey)&&e.key==='n'){e.preventDefault();openCaseModal();}
});

loadData();setThemeMode(themeMode);setupSearch();updateStorage();renderCatChips();render();
setInterval(()=>{if(themeMode==='auto')applyTheme();},60000);
</script>
</body>
